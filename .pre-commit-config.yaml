---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        language: system
        entry: uvx yamllint
        types: [yaml]

      - id: ansible-lint
        name: ansible-lint
        language: system
        entry: uvx ansible-lint ansible/
        pass_filenames: false
        files: ^ansible/

      - id: helm-lint
        name: helm lint
        language: system
        entry: bash -c 'for d in kubernetes/charts/*/; do helm lint "$d"; done && helm lint kubernetes/apps/addons/argocd-apps/'
        pass_filenames: false
        files: ^kubernetes/(charts|apps/addons/argocd-apps)/

      - id: terraform-fmt
        name: terraform fmt
        language: system
        entry: terraform fmt -check -recursive terraform/
        pass_filenames: false
        files: \.tf$
