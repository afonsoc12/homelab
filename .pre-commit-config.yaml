---
fail_fast: true
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        exclude: \.svg$
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: yamllint
        name: yamllint
        language: system
        entry: uv run yamllint
        types: [yaml]

      - id: ansible-lint
        name: ansible-lint
        language: system
        entry: bash -c 'cd ansible && uv run ansible-lint --fix .'
        pass_filenames: false
        files: ^ansible/

      - id: helm-lint
        name: helm lint
        language: system
        entry: bash -c 'find kubernetes -name "Chart.yaml" | xargs -I{} dirname {} | while read chart; do helm lint "$chart"; done'
        pass_filenames: false
        files: ^kubernetes/(charts|apps/addons/argocd-apps)/

      - id: terraform-fmt
        name: terraform fmt
        language: system
        entry: terraform fmt -recursive terraform/
        pass_filenames: false
        files: \.tf$

      - id: ruff-format
        name: ruff format
        entry: uv run --directory airflow ruff format
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        files: ^airflow/

      - id: ruff-check
        name: ruff check
        entry: uv run --directory airflow ruff check --fix
        language: system
        types: [python]
        pass_filenames: false
        require_serial: true
        files: ^airflow/

      - id: pytest
        name: pytest
        entry: uv run --directory airflow pytest
        language: system
        types: [python]
        pass_filenames: false
        files: ^airflow/
