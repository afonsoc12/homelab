name: ⏱️ Airflow build

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
    paths:
      - airflow/**
      - .github/workflows/airflow-build.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  airflow:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "🐍 Set up uv"
        uses: astral-sh/setup-uv@v8.2.0
        with:
          working-directory: airflow
          activate-environment: "true"

      - name: "📦 Install dependencies"
        run: uv sync --directory airflow --group dev --frozen

      - name: "🔎 ruff format"
        run: uv run --directory airflow ruff format --check

      - name: "🔎 ruff check"
        run: uv run --directory airflow ruff check

      - name: "🧪 Run pytest"
        run: uv run --directory airflow pytest

      - name: "🏗️ Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "🔐 Login to GHCR"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🚀 Build and Push Image"
        uses: docker/build-push-action@v7
        with:
          context: airflow
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/airflow:3.2.1-b${{ github.run_number }}

  bump-tag:
    runs-on: ubuntu-latest
    needs: airflow
    if: github.event_name != 'pull_request'

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "🏷️ Bump image tag"
        run: |
          yq -i '.image.tag = "3.2.1-b${{ github.run_number }}"' kubernetes/apps/addons/airflow/values.sops.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add kubernetes/apps/addons/airflow/values.sops.yaml
          git commit -m "chore: bump airflow image to 3.2.1-b${{ github.run_number }}"
          git push
