---
name: 📚 Docs

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

on: # yamllint disable-line rule:truthy
  pull_request:
    paths:
      - docs/**
      - mkdocs.yml
  push:
    branches:
      - master
    paths:
      - docs/**
      - mkdocs.yml
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    name: 🏗️ Build Docs
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v7

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: ⚡ Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          activate-environment: true

      - name: 📦 Install dependencies
        run: uv sync --locked --all-groups

      - name: 🏷️ Extract version from commit SHA
        id: version
        run: |
          VERSION="$(date -u +%Y.%m.%d)+${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: 🔨 Build mkdocs
        env:
          DOCS_VERSION: ${{ steps.version.outputs.version }}
        run: uv run mkdocs build --site-dir site

      - name: 🗜️ Archive site
        run: zip -r homelab-docs-v${{ steps.version.outputs.version }}.zip site/

      - name: ⬆️ Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

      - name: ⬆️ Upload release archive
        uses: actions/upload-artifact@v7
        with:
          name: release-archive
          path: homelab-docs-v${{ steps.version.outputs.version }}.zip

  deploy:
    name: 🌐 Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish:
    name: 📦 GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    steps:
      - name: ⬇️ Download release archive
        uses: actions/download-artifact@v8
        with:
          name: release-archive

      - name: 🚀 Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build.outputs.version }}
          name: v${{ needs.build.outputs.version }}
          generate_release_notes: true
          make_latest: true
          files: homelab-docs-v${{ needs.build.outputs.version }}.zip
