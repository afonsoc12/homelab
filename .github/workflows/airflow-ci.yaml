name: airflow-ci

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - develop
    paths:
      - airflow/**
      - .github/workflows/airflow-ci.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  airflow:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "🐍 Set up uv"
        uses: astral-sh/setup-uv@v8
        with:
          version-file: airflow/pyproject.toml
          activate-environment: "true"

      - name: "📦 Install dependencies"
        run: uv sync --project airflow --group dev

    #   - name: "🧹 Ruff format check"
    #     run: uv run --project airflow ruff format --check airflow

    #   - name: "🔎 Ruff lint"
    #     run: uv run --project airflow ruff check airflow

    #   - name: "🧪 Pytest"
    #     run: uv run --project airflow pytest airflow/tests

      - name: "🏗️ Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "🔐 Login to GHCR"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🚀 Build and Push Image"
        uses: docker/build-push-action@v7
        with:
          context: airflow
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/airflow:3.2.1-b${{ GITHUB_RUN_NUMBER }}
