name: ⏱️ Airflow build

on: # yamllint disable-line rule:truthy
  push:
    branches:
      - master
      - develop
    paths:
      - airflow/**
      - .github/workflows/airflow-ci.yaml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  airflow:
    runs-on: ubuntu-latest

    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "🐍 Set up uv"
        uses: astral-sh/setup-uv@v8.1.0
        with:
          working-directory: airflow
          activate-environment: "true"

      - name: "📦 Install dependencies"
        run: uv sync --project airflow --group dev --frozen

      - name: "🔎 ruff format"
        run: uv run --project airflow ruff format --check

      - name: "🔎 ruff check"
        run: uv run --project airflow ruff check

      - name: "✅ Run pytest"
        run: uv run --project airflow pytest -m "not integration"

      - name: "🏗️ Set up Docker Buildx"
        uses: docker/setup-buildx-action@v4

      - name: "🔐 Login to GHCR"
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "🚀 Build and Push Image"
        uses: docker/build-push-action@v7
        with:
          context: airflow
          push: ${{ github.event_name != 'pull_request' }}
          tags: ghcr.io/${{ github.repository_owner }}/airflow:3.2.1-b${{ github.run_number }}
