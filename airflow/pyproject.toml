[project]
name = "homelab-airflow"
version = "0.0.1"
description = "Airflow DAGs and tooling for homelab"
requires-python = ">=3.14,<3.15"
dependencies = [
    "apache-airflow==3.2.1",
    "apache-airflow-providers-cncf-kubernetes==10.16.0",
    "psycopg2-binary==2.9.12",
]

[dependency-groups]
dev = [
    "pytest>=8.4.0",
    "ruff>=0.11.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pytest.ini_options]
testpaths = ["tests"]
