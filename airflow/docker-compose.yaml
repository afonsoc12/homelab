services:
  airflow:
    container_name: airflow
    build:
      context: .
    image: homelab-airflow:local
    volumes:
      - .:/opt/airflow
      - airflow-data:/data
      - ./local-secrets:/var/run/secrets/airflow
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    container_name: postgres
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: airflow_data
    volumes:
      - postgres-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d airflow_data"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  airflow-data:
