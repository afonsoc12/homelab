## Application controller
controller:
    # -- Application controller name string
    name: application-controller
    # -- The number of application controller pods to run.
    # Additional replicas will cause sharding of managed clusters across number of replicas.
    replicas: 1
## Dex
dex:
    # -- Enable dex
    enabled: false
    # -- Dex name
    name: dex-server
## Redis
redis:
    # -- Enable redis
    enabled: true
    # -- Redis name
    name: redis
    # External Redis parameters
    # externalRedis:
    #   # -- External Redis server host
# host: "redis.databases"
#   # -- External Redis username
#   username: ""
#   # -- External Redis password
#   password: ""
#   # -- External Redis server port
# port: 6379
#   # -- The name of an existing secret with Redis credentials (must contain key `redis-password`).
#   # When it's set, the `externalRedis.password` parameter is ignored
#   existingSecret: ""
#   # -- External Redis Secret annotations
#   secretAnnotations: {}
## Server
server:
    # -- Argo CD server name
    name: server
    # -- The number of server pods to run
    replicas: 1
    ingress:
        enabled: true
        annotations:
            nginx.ingress.kubernetes.io/backend-protocol: HTTPS
            nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
            nginx.ingress.kubernetes.io/ssl-passthrough: "true"
        ingressClassName: nginx
        path: /
        pathType: Prefix
        tls: false
        extraTls:
            - secretName: local-wildcard-cert
## Repo Server
repoServer:
    # -- Repo server name
    name: repo-server
    # -- The number of repo server pods to run
    replicas: 1
    # -- Environment variables to pass to repo server
    env:
        - name: HELM_PLUGINS
          value: /gitops-tools/helm-plugins/
        - name: HELM_SECRETS_CURL_PATH
          value: /gitops-tools/curl
        - name: HELM_SECRETS_SOPS_PATH
          value: /gitops-tools/sops
        - name: HELM_SECRETS_VALS_PATH
          value: /gitops-tools/vals
        - name: HELM_SECRETS_KUBECTL_PATH
          value: /gitops-tools/kubectl
        - name: HELM_SECRETS_BACKEND
          value: sops
        # https://github.com/jkroepke/helm-secrets/wiki/Security-in-shared-environments
        - name: HELM_SECRETS_VALUES_ALLOW_SYMLINKS
          value: "false"
        - name: HELM_SECRETS_VALUES_ALLOW_ABSOLUTE_PATH
          value: "true"
        - name: HELM_SECRETS_VALUES_ALLOW_PATH_TRAVERSAL
          value: "true"
        - name: HELM_SECRETS_WRAPPER_ENABLED
          value: "true"
        - name: HELM_SECRETS_DECRYPT_SECRETS_IN_TMP_DIR
          value: "true"
        - name: HELM_SECRETS_HELM_PATH
          value: /usr/local/bin/helm
        - name: HELM_SECRETS_LOAD_GPG_KEYS
          # Multiple keys can be separated by space
          value: /homelab-sops-gpg/sops.asc
    # -- Init containers to add to the repo server pods
    initContainers:
        - name: download-tools
          image: docker.io/alpine:3.22.4
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
          env:
            - name: HELM_SECRETS_VERSION
              value: 4.7.6
            - name: KUBECTL_VERSION
              value: 1.35.4
            - name: VALS_VERSION
              value: 0.43.9
            - name: SOPS_VERSION
              value: 3.12.2
          args:
            - |
              mkdir -p /gitops-tools/helm-plugins

              GO_ARCH=$(uname -m | sed -e 's/x86_64/amd64/')
              wget -qO /gitops-tools/curl https://github.com/moparisthebest/static-curl/releases/latest/download/curl-${GO_ARCH}

              GO_ARCH=$(uname -m | sed -e 's/x86_64/amd64/' -e 's/\(arm\)\(64\)\?.*/\1\2/' -e 's/aarch64$/arm64/') && \
              wget -qO /gitops-tools/kubectl https://dl.k8s.io/release/v${KUBECTL_VERSION}/bin/linux/${GO_ARCH}/kubectl
              wget -qO /gitops-tools/sops https://github.com/getsops/sops/releases/download/v${SOPS_VERSION}/sops-v${SOPS_VERSION}.linux.${GO_ARCH}
              wget -qO- https://github.com/helmfile/vals/releases/download/v${VALS_VERSION}/vals_${VALS_VERSION}_linux_${GO_ARCH}.tar.gz | tar zxv -C /gitops-tools vals
              wget -qO- https://github.com/jkroepke/helm-secrets/releases/download/v${HELM_SECRETS_VERSION}/helm-secrets.tar.gz | tar -C /gitops-tools/helm-plugins -xzf-

              chmod +x /gitops-tools/*
              cp /gitops-tools/helm-plugins/helm-secrets/scripts/wrapper/helm.sh /gitops-tools/helm
          volumeMounts:
            - mountPath: /gitops-tools
              name: gitops-tools
    # -- Additional volumeMounts to the repo server main container
    volumeMounts:
        - mountPath: /gitops-tools
          name: gitops-tools
        - mountPath: /usr/local/sbin/helm
          subPath: helm
          name: gitops-tools
        - mountPath: /homelab-sops-gpg/
          name: homelab-sops-gpg
    # -- Additional volumes to the repo server pod
    volumes:
        - name: gitops-tools
          emptyDir: {}
        # kubectl create secret generic homelab-sops-gpg --from-file=sops.asc=assets/gpg/private2.gpg
        - name: homelab-sops-gpg
          secret:
            secretName: ENC[AES256_GCM,data:cBgR0WfNdkQLxSYnWV/brw==,iv:VwSkNWsHXLG+qeS0+PqsfKnHBZYBQScqFaXGKdHkLbg=,tag:sHuz3jUJcIy7IqeVnsgk8A==,type:str]
## ApplicationSet controller
applicationSet:
    # -- Enable ApplicationSet controller
    enabled: true
    # -- ApplicationSet controller name string
    name: applicationset-controller
## Notifications controller
notifications:
    # -- Enable notifications controller
    enabled: true
    # -- Notifications controller name string
    name: notifications-controller
    argocdUrl: ENC[AES256_GCM,data:mqcq1wzUY3j9HYBmtWeIwADF/BowMMoNcHSLbU105GIWQA==,iv:YpQCGlDC1JM83+GeqooamErpV+/X1DXbqzqRKrIdY0M=,tag:Q3bZtWG0YwQFCmTF2WtEwQ==,type:str]
    secret:
        items:
            discord-webhook: ENC[AES256_GCM,data:N7b9q590r3yhWoFzaJiMFStd+S4wzuuqOTSeJap1oPG3nmo4rSeyKv2L+vUAfZwk/0PT/S1m4uUxjyQzKPf1s8KTcnfgIDNw8U6sQf7alfc1JFMLdvGpWuccFwSL9z0CK2Gt2gMRvuE3mqEoMQlVLakIUhJ29YxfEQ==,iv:AAAwPpqvIN2tnJ2D77E4aKTfPx+93g/jWEJe10GbBVo=,tag:SNzCU6qFhiAt1u0yJe83yQ==,type:str]
    notifiers:
        service.webhook.discord: |
            url: $discord-webhook
            headers:
              - name: Content-Type
                value: application/json
    templates:
        template.app-deployed: |
            webhook:
              discord:
                method: POST
                body: |
                  {
                    "embeds": [{
                      "title": "✅ {{.app.metadata.name}} deployed",
                      "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                      "color": 3066993,
                      "fields": [
                        {"name": "Application", "value": "[{{.app.metadata.name}}]({{.context.argocdUrl}}/applications/{{.app.metadata.name}})", "inline": false},
                        {"name": "Cluster", "value": "{{.app.spec.destination.name}}", "inline": false},
                        {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": false},
                        {"name": "Author", "value": "{{(call .repo.GetCommitMetadata .app.status.sync.revision).Author}}", "inline": false},
                        {"name": "Revision", "value": "[{{.app.status.sync.revision | trunc 7}}]({{call .repo.RepoURLToHTTPS .app.spec.source.repoURL}}/commit/{{.app.status.sync.revision}})", "inline": false},
                        {"name": "Last Updated", "value": "{{.app.status.operationState.finishedAt}}", "inline": false},
                        {"name": "Commit", "value": "{{(call .repo.GetCommitMetadata .app.status.sync.revision).Message | trunc 100}}", "inline": false}
                      ]
                    }]
                  }
        template.app-health-degraded: "webhook:\n  discord:\n    method: POST\n    body: |\n      {\n        \"embeds\": [{\n          \"title\": \"\U0001F534 {{.app.metadata.name}} health degraded\",\n          \"url\": \"{{.context.argocdUrl}}/applications/{{.app.metadata.name}}\",\n          \"color\": 15158332,\n          \"fields\": [\n            {\"name\": \"Application\", \"value\": \"[{{.app.metadata.name}}]({{.context.argocdUrl}}/applications/{{.app.metadata.name}})\", \"inline\": false},\n            {\"name\": \"Cluster\", \"value\": \"{{.app.spec.destination.name}}\", \"inline\": false},\n            {\"name\": \"Namespace\", \"value\": \"{{.app.spec.destination.namespace}}\", \"inline\": false},\n            {\"name\": \"Health\", \"value\": \"{{.app.status.health.status}}\", \"inline\": false},\n            {\"name\": \"Last Updated\", \"value\": \"{{.app.status.reconciledAt}}\", \"inline\": false}\n          ]\n        }]\n      }\n"
        template.app-sync-failed: |
            webhook:
              discord:
                method: POST
                body: |
                  {
                    "embeds": [{
                      "title": "❌ {{.app.metadata.name}} sync failed",
                      "url": "{{.context.argocdUrl}}/applications/{{.app.metadata.name}}",
                      "color": 15158332,
                      "fields": [
                        {"name": "Application", "value": "[{{.app.metadata.name}}]({{.context.argocdUrl}}/applications/{{.app.metadata.name}})", "inline": false},
                        {"name": "Cluster", "value": "{{.app.spec.destination.name}}", "inline": false},
                        {"name": "Namespace", "value": "{{.app.spec.destination.namespace}}", "inline": false},
                        {"name": "Author", "value": "{{(call .repo.GetCommitMetadata .app.status.sync.revision).Author}}", "inline": false},
                        {"name": "Revision", "value": "[{{.app.status.sync.revision | trunc 7}}]({{call .repo.RepoURLToHTTPS .app.spec.source.repoURL}}/commit/{{.app.status.sync.revision}})", "inline": false},
                        {"name": "Last Updated", "value": "{{.app.status.operationState.finishedAt}}", "inline": false},
                        {"name": "Error", "value": "{{.app.status.operationState.message | default "N/A"}}", "inline": false}
                      ]
                    }]
                  }
    triggers:
        trigger.on-deployed: |
            - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
              oncePer: app.status.sync.revision
              send: [app-deployed]
        trigger.on-health-degraded: |
            - when: app.status.health.status == 'Degraded'
              oncePer: app.status.reconciledAt
              send: [app-health-degraded]
        trigger.on-sync-failed: |
            - when: app.status.operationState.phase in ['Error', 'Failed']
              oncePer: app.status.sync.revision
              send: [app-sync-failed]
    subscriptions:
        - recipients:
            - discord
          triggers:
            - on-deployed
            - on-health-degraded
            - on-sync-failed
