# --------------------
# kube-prometheus-stack
#   - Docs: https://prometheus.io/docs/
#   - Chart: https://prometheus-community.github.io/helm-charts (kube-prometheus-stack)
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-stack
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 83.7.0
      chart: kube-prometheus-stack
      helm:
        valueFiles:
          - $values/kubernetes/apps/values.sops.yaml
          - $values/kubernetes/apps/monitoring/prometheus-stack/values.sops.yaml
    - repoURL: git@github.com:afonsoc12/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
