# --------------------
# agnhost
#   - Image: registry.k8s.io/e2e-test-images/agnhost
#   - Chart: adhoc-resources
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: agnhost
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: git@github.com:afonsoc12/homelab.git
    targetRevision: HEAD
    path: kubernetes/charts/adhoc-resources
    helm:
      valueFiles:
        - ../../apps/addons/agnhost/values.yaml

  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: addons

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
