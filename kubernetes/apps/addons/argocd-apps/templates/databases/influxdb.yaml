# --------------------
# InfluxDB
#   - Docs: https://docs.influxdata.com/influxdb/v2/
#   - Chart: database-svc
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: influxdb
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:afonsoc12/homelab.git
    targetRevision: HEAD
    path: kubernetes/charts/database-svc
    helm:
      valueFiles:
        - secrets://../../apps/values.sops.yaml
        - secrets://../../apps/databases/influxdb/values.sops.yaml
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: databases
