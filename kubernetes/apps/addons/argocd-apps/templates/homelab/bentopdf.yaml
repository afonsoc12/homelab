# --------------------
# bentopdf
#   - Image: ghcr.io/alam00000/bentopdf-simple:2.8.4
#   - Chart: homelab-svc
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bentopdf
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:afonsoc12/homelab.git
    targetRevision: HEAD
    path: kubernetes/charts/homelab-svc
    helm:
      valueFiles:
        - secrets://../../apps/values.sops.yaml
        - ../../apps/homelab/bentopdf/values.yaml
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: homelab

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
