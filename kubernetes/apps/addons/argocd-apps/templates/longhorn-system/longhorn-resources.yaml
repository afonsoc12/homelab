# --------------------
# Longhorn Resources
#   - Docs: https://longhorn.io/docs/
#   - Chart: adhoc-resources
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: longhorn-resources
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:afonsoc12/homelab.git
    targetRevision: HEAD
    path: kubernetes/charts/adhoc-resources
    helm:
      valueFiles:
        - secrets://../../apps/values.sops.yaml
        - secrets://../../apps/longhorn-system/longhorn-resources/values.sops.yaml
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: longhorn-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
