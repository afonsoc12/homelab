# --------------------
# Plex Relay
#   - Nginx reverse proxy on k3s-oci-m3 relaying Plex traffic via Tailscale
#   - Preserves real client IPs via X-Forwarded-For for Tautulli
#   - Chart: homelab-svc
# --------------------
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: plex-relay
  namespace: {{ .Release.Namespace }}
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: git@github.com:afonsoc12/homelab.git
      targetRevision: HEAD
      path: kubernetes/charts/homelab-svc
      helm:
        valueFiles:
          - $values/kubernetes/apps/ingress/plex-relay/values.yaml
    - repoURL: git@github.com:afonsoc12/homelab.git
      targetRevision: HEAD
      ref: values
  destination:
    name: {{ .Values.spec.destination.name }}
    namespace: ingress
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
