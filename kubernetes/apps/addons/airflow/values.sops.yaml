pvc:
    storageClassName: longhorn
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 5Gi
volumeMounts:
    - name: data
      mountPath: /data
    - name: secrets
      mountPath: /var/run/secrets/airflow
      readOnly: true
volumes:
    - name: data
      mountPvc: true
    - name: secrets
      secret:
        secretName: airflow-secrets-backend
ingress:
    enabled: true
    authelia: true
    className: nginx
    tls:
        - secretName: local-wildcard-cert
    hosts:
        - host: airflow.local.{{ .Values.domain }}
          paths:
            - path: /
              pathType: ImplementationSpecific
