configmap:
    mountEnv: true
    data:
        ALLOW_SIGNUP: "false"
        PUID: 1000
        PGID: 1000
        BASE_URL: https://mealie.local.{{ .Values.domain }}
        DB_ENGINE: postgres
        POSTGRES_SERVER: postgres.databases
        POSTGRES_PORT: 5432
        POSTGRES_DB: mealie
        OIDC_AUTH_ENABLED: "true"
        ALLOW_PASSWORD_LOGIN: "false"
volumeMounts:
    - mountPath: /app/data
      name: data
volumes:
    - name: data
      mountPvc: "yes"
pvc:
    storageClassName: longhorn-persistent
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 1Gi
ingress:
    enabled: true
    authelia: true
    className: nginx
    # annotations:
    #     nginx.ingress.kubernetes.io/client-max-body-size: "0"
    #     nginx.ingress.kubernetes.io/proxy-body-size: "0"
    tls:
        - secretName: local-wildcard-cert
    # Will assume the first element in .ports, regardless of service
    hosts:
        - host: mealie.local.{{ .Values.domain }}
          paths:
            - path: /
              pathType: ImplementationSpecific
livenessProbe: {}
readinessProbe: {}
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi
podSecurityContext: {}
# fsGroup: 2000
securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000
nodeSelector: {}
tolerations: []
affinity:
    podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                namespaceSelector: {}
                labelSelector:
                    matchExpressions:
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - postgres
                topologyKey: kubernetes.io/hostname
