# annot_2: def
replicas: 1
revisionHistoryLimit: 0
strategy:
    type: Recreate
image:
    repository: ghcr.io/mealie-recipes/mealie
    tag: v3.3.2
    pullPolicy: Always
#   restartPolicy:
command: {}
args: {}
ports:
    - containerPort: 9000
      name: http
      protocol: TCP
      service: true
# Uses ports from .ports section, if service is true
