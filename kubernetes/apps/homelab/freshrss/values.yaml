# --------------------
# FreshRSS
#   - Repo:           https://github.com/FreshRSS/FreshRSS
#   - Docs:           https://freshrss.github.io/FreshRSS/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1

image:
  repository: docker.io/linuxserver/freshrss
  tag: 1.29.1

strategy:
  type: Recreate

ports:
  - containerPort: 80
    service: true

# Uses ports from .ports section, if service is true
service:
  enabled: true

volumeMounts:
  - name: config
    mountPath: /config
    # readOnly: true

volumes:
  - name: config
    mountPvc: true

pvc:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

ingress:
  enabled: true
  authelia: true
  className: "nginx"
  annotations: {}
  tls:
    - secretName: rss-cert
  hosts:
    - host: rss.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix
mydomain: "{{ .Values.local.domain }}"

resources:
  limits:
    cpu: 50m
    memory: 160Mi
  requests:
    cpu: 25m
    memory: 80Mi

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 30
