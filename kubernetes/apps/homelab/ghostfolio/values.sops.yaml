configmap:
    mountEnv: true
    data:
        NODE_ENV: production
        BASE_CURRENCY: GBP
        HOST: 0.0.0.0
        PORT: "3333"
        REDIS_HOST: redis.databases
        REDIS_PORT: "6379"
volumeMounts: {}
# - name: config
#   mountPath: "/config"
#   readOnly: true
volumes: {}
# - name: config
#   projected:
#     sources:
#     - configMap:
#         name: authelia-config
#         items:
#         - key: "configuration.yml"
#           path: "configuration.yml"
# - name: config
#   mountPvc: yes
pvc: {}
# storageClassName: longhorn
# accessModes:
# - ReadWriteOnce
# resources:
#   requests:
#     storage: 2Gi
ingress:
    enabled: true
    authelia: true
    className: nginx
    annotations: {}
    # nginx.ingress.kubernetes.io/client-max-body-size: "0"
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    tls:
        - secretName: stocks-cert
    #    hosts:
    #      - chart-example.local
    # Will assume the first element in .ports, regardless of service
    hosts:
        - host: stocks.{{ .Values.domain }}
          paths:
            - path: /
              pathType: Prefix
livenessProbe: {}
readinessProbe: {}
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi
podSecurityContext: {}
# fsGroup: 2000
securityContext: {}
