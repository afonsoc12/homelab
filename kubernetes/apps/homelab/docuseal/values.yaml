# --------------------
# DocuSeal
#   - Repo:           https://github.com/docusealco/docuseal
#   - Docs:           https://www.docuseal.com/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1
revisionHistoryLimit: 0
strategy:
  type: Recreate
image:
  repository: docker.io/docuseal/docuseal
  tag: 3.1.2
  pullPolicy: Always
#   restartPolicy:
command: {}
args: {}
ports:
  - containerPort: 3000
    name: http
    protocol: TCP
    service: true
# Uses ports from .ports section, if service is true
service:
  enabled: true
volumeMounts:
  - mountPath: /data
    name: data
volumes:
  - name: data
    mountPvc: "yes"
pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
ingress:
  enabled: true
  authelia: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/client-max-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
  tls:
    - secretName: local-wildcard-cert
  # Will assume the first element in .ports, regardless of service
  hosts:
    - host: sign.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: ImplementationSpecific
resources:
  limits:
    cpu: 100m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 3000
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 3000
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

startupProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 18
  timeoutSeconds: 5
