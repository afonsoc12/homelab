# --------------------
# bentopdf
#   - Repo:           https://github.com/Alamino/BentoPDF
#   - Image:          ghcr.io/alam00000/bentopdf-simple:2.8.4
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1

image:
  repository: ghcr.io/alam00000/bentopdf-simple
  tag: 2.8.5

strategy:
  type: Recreate

ports:
  - containerPort: 8080
    service: true

service:
  enabled: true

ingress:
  enabled: true
  authelia: false
  className: "nginx"
  annotations: {}
  tls:
    - secretName: local-wildcard-cert
  hosts:
    - host: pdf.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 50m
    memory: 32Mi
  requests:
    cpu: 25m
    memory: 16Mi

livenessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  httpGet:
    path: /
    port: 8080
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

startupProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 18
  timeoutSeconds: 5
