# --------------------
# BookLore
#   - Repo:           https://github.com/adityachandelgit/BookLore
#   - Docs:           https://github.com/adityachandelgit/booklore
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/external-svc/values.yaml
# --------------------
---
labels:
  host: hoarder

server:
  ip: "{{ .Values.ips_tailscale.hoarder }}"
  port: 6060

ingress:
  enabled: true
  authelia: true
  tls:
    - secretName: local-wildcard-cert
  hosts:
    - host: booklore.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix
