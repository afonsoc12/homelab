# --------------------
# AdGuard Home
#   - Repo:           https://github.com/AdguardTeam/AdGuardHome
#   - Docs:           https://adguard.com/en/adguard-home/overview.html
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/external-svc/values.yaml
# --------------------
---
# Default values for external-service.

# Labels applied to all templates
labels:
  host: rpi-4b

# External server configuration
server:
  ip: "{{ .Values.ips.rpi_4b }}"
  port: 80

# Ingress configuration
ingress:
  enabled: true
  authelia: true
  tls:
    - secretName: local-wildcard-cert
  hosts:
    - host: adguard.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix
