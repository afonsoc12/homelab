# --------------------
# Wealthfolio
#   - Repo:           https://github.com/afadil/wealthfolio
#   - Docs:           https://wealthfolio.app/docs/self-hosting/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
#   - Notes:          SQLite-only (no Postgres). DB persisted on a Longhorn PVC at /data.
# --------------------
replicas: 1
revisionHistoryLimit: 0
enableServiceLinks: false
strategy:
    type: Recreate
image:
    repository: docker.io/wealthfolio/wealthfolio
    tag: 3.6.1
    pullPolicy: Always
command: {}
args: {}
ports:
    - containerPort: 8088
      name: http
      protocol: TCP
      service: true
service:
    enabled: true
secret:
    mountEnv: true
    stringData:
        WF_SECRET_KEY: ENC[AES256_GCM,data:uOuiZUZcor+QSVEGHrCnw+rkCg8caOISyMtfoBm5/LcDohHh2maDZT2Wet8=,iv:3UFMJxynCtfPkrWlBAewOSZ9Yanjf81YfKDzniDNU2A=,tag:iVuSVW3PGgLk79mvmkLiEQ==,type:str]
        WF_AUTH_PASSWORD_HASH: ENC[AES256_GCM,data:9WRKecmvaIEYCQn/zdAjvM1l7fQw8Pv11ZqH2FITRcYu6M/n4Z1P8efXKg/wdC9FOj/qHmSxxcdalutjK2/k9TysVaSussD40QEbEo1MLM+/kqBNJd2JAS9vcN9fAqe2AQ==,iv:bxIsNNYjrg0/AE4blfDh3Yekpa7FtWst0DEP7nVJyDc=,tag:5Eijakcl3P/znMQwEWXJBA==,type:str]
configmap:
    mountEnv: true
    data:
        WF_LISTEN_ADDR: 0.0.0.0:8088
        WF_DB_PATH: /data/wealthfolio.db
        WF_AUTH_REQUIRED: "true"
        WF_CORS_ALLOW_ORIGINS: https://wealth.local.{{ .Values.domain }}
volumeMounts:
    - mountPath: /data
      name: data
volumes:
    - name: data
      mountPvc: "yes"
pvc:
    storageClassName: longhorn-persistent
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 2Gi
ingress:
    enabled: true
    authelia: true
    className: nginx
    tls:
        - secretName: local-wildcard-cert
    hosts:
        - host: wealth.local.{{ .Values.domain }}
          paths:
            - path: /
              pathType: ImplementationSpecific
livenessProbe:
    httpGet:
        path: /api/v1/healthz
        port: 8088
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3
startupProbe:
    httpGet:
        path: /api/v1/healthz
        port: 8088
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 10
    failureThreshold: 30
readinessProbe:
    httpGet:
        path: /api/v1/healthz
        port: 8088
    initialDelaySeconds: 10
    periodSeconds: 15
    timeoutSeconds: 10
    failureThreshold: 3
resources:
    limits:
        cpu: 500m
        memory: 512Mi
    requests:
        cpu: 100m
        memory: 128Mi
podSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroup: 1000
securityContext:
    allowPrivilegeEscalation: false
    capabilities:
        drop:
            - ALL
nodeSelector: {}
tolerations: []
affinity: {}
