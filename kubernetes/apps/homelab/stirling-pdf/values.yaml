# --------------------
# Stirling PDF
#   - Repo:           https://github.com/Stirling-Tools/Stirling-PDF
#   - Docs:           https://docs.stirlingpdf.com/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1

image:
  repository: docker.io/stirlingtools/stirling-pdf
  tag: 2.9.2-ultra-lite

strategy:
  type: Recreate

ports:
  - containerPort: 8080
    service: true

# Uses ports from .ports section, if service is true
service:
  enabled: true

volumeMounts:
  - name: config
    mountPath: /configs
    # readOnly: true

volumes:
  - name: config
    emptyDir: {sizeLimit: 2Gi}

# pvc:
#   accessModes:
#     - ReadWriteOnce
#   resources:
#     requests:
#       storage: 5Gi

ingress:
  enabled: true
  authelia: false
  className: "nginx"
  annotations: {}
  tls:
    - secretName: local-wildcard-cert
  hosts:
    - host: pdf.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix
