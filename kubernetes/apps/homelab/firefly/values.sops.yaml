        MAIL_PASSWORD: ENC[AES256_GCM,data:EivbRkfsgjaYTEi8VEZLroT7/xAzE6FcWehqvWg28IPhFd1gFSJF0wwOPbx54S6Piar2H3UOqr342xgd/eEUY9UdXtlD,iv:Ge0D7XlziljeU/uQzGOuGR6jcUvzPFnA0TVnWS/zgiY=,tag:nO394t+jggYlwLkbQNA17A==,type:str]
configmap:
    mountEnv: true
    data:
        APP_URL: firefly.{{ .Values.domain }}
        DB_CONNECTION: mysql
        DB_HOST: mariadb.databases
        DB_PORT: "3306"
        CACHE_DRIVER: redis
        SESSION_DRIVER: redis
        REDIS_HOST: redis.databases
        REDIS_PORT: "6379"
        TRUSTED_PROXIES: '**'
        MAIL_MAILER: smtp
        MAIL_ENCRYPTION: tls
volumeMounts:
    - mountPath: /var/www/html/storage/upload
      name: upload
volumes:
    - name: upload
      mountPvc: "yes"
pvc:
    storageClassName: longhorn-persistent
    accessModes:
        - ReadWriteOnce
    resources:
        requests:
            storage: 2Gi
ingress:
    enabled: true
    authelia: true
    className: nginx
    annotations:
        nginx.ingress.kubernetes.io/client-max-body-size: "0"
        nginx.ingress.kubernetes.io/proxy-body-size: "0"
    tls:
        - secretName: firefly-cert
    # Will assume the first element in .ports, regardless of service
    hosts:
        - host: firefly.{{ .Values.domain }}
          paths:
            - path: /
              pathType: ImplementationSpecific
livenessProbe: {}
readinessProbe: {}
resources: {}
# limits:
#   cpu: 100m
#   memory: 128Mi
# requests:
#   cpu: 100m
#   memory: 128Mi
podSecurityContext: {}
# fsGroup: 2000
securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000
nodeSelector: {}
tolerations: []
affinity:
    podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                namespaceSelector: {}
                labelSelector:
                    matchExpressions:
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - mariadb
                topologyKey: kubernetes.io/hostname
cronjobs:
    - name: firefly-cron
      labels: {}
      podAnnotations: {}
      schedule: 5 * * * *
      concurrencyPolicy: Forbid
      failedJobsHistoryLimit: 1
      successfulJobsHistoryLimit: 1
      image:
        repository: docker.io/curlimages/curl
        tag: 8.19.0
        pullPolicy: Always
      restartPolicy: Never
      command:
        - sh
        - -c
      args:
        - |
          curl -vv \
            --fail \
            --retry 5 \
            --retry-delay 5 \
            --retry-connrefused \
            --connect-timeout 5 \
            --max-time 15 \
            -H 'accept: application/json' \
            http://firefly:8080/api/v1/cron/$(CRON_TOKEN)
      env:
        - name: CRON_TOKEN
          valueFrom:
            secretKeyRef:
                name: firefly
                key: CRON_TOKEN
      affinity:
        podAffinity:
            preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 1
                  podAffinityTerm:
                    labelSelector:
                        matchExpressions:
                            - key: app.kubernetes.io/instance
                              operator: In
                              values:
                                - '{{ $.Release.Name }}'
                    topologyKey: kubernetes.io/hostname
