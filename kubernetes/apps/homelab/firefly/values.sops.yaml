nameOverride: ""
fullnameOverride: ""
labels: {}
# label_1: abc
# label_2: def
podAnnotations: {}
# annot_1: abc
# annot_2: def
replicas: 1
revisionHistoryLimit: 0
strategy:
    type: Recreate
image:
    repository: docker.io/fireflyiii/core
    tag: version-6.5.9
    pullPolicy: Always
#   restartPolicy:
command: {}
args: {}
ports:
    - containerPort: 8080
      name: http
      protocol: TCP
      service: true
# Uses ports from .ports section, if service is true
