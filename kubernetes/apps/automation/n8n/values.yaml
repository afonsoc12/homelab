# --------------------
# n8n
#   - Repo:           https://github.com/n8n-io/n8n
#   - Docs:           https://docs.n8n.io/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
image:
  repository: docker.io/n8nio/n8n
  tag: 2.27.3
  pullPolicy: Always

# hostNetwork: true

ports:
  - containerPort: 5678
    name: http
    protocol: TCP
    service: true

service:
  enabled: true

volumeMounts:
  - name: data
    mountPath: /home/node/.n8n

volumes:
  - name: data
    mountPvc: true

pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

configmap:
  mountEnv: true
  data:
    N8N_PORT: "5678"

ingress:
  enabled: true
  authelia: true
  className: "nginx"
  tls:
    - secretName: local-wildcard-cert
  hosts:
    - host: n8n.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  httpGet:
    path: /healthz
    port: 5678
  initialDelaySeconds: 90
  periodSeconds: 10
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /healthz/readiness
    port: 5678
  initialDelaySeconds: 60
  periodSeconds: 10
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /healthz
    port: 5678
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 30

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 500Mi

podSecurityContext:
  fsGroup: 1000
