# --------------------
# Home Assistant
#   - Repo:           https://github.com/home-assistant/core
#   - Docs:           https://www.home-assistant.io/docs/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1
revisionHistoryLimit: 0
strategy:
  type: Recreate

image:
  repository: docker.io/homeassistant/home-assistant
  tag: 2026.6.4
  pullPolicy: Always

hostNetwork: true

ports:
  - containerPort: 8123
    name: http
    protocol: TCP
    service: true

# Uses ports from .ports section, if service is true
service:
  enabled: true

volumeMounts:
  - name: config
    mountPath: "/config"

volumes:
  - name: config
    mountPvc: true

pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi

ingress:
  enabled: true
  authelia: true
  className: "nginx"
  tls:
    - secretName: home-cert

  # Will assume the first element in .ports, regardless of service
  hosts:
    - host: home.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

nodeSelector:
  kubernetes.io/hostname: k3s-m1

tolerations: []

affinity: {}

resources:
  limits:
    cpu: 200m
    memory: 1600Mi
  requests:
    cpu: 100m
    memory: 800Mi

livenessProbe:
  tcpSocket:
    port: 8123
  initialDelaySeconds: 120
  periodSeconds: 30
  failureThreshold: 5

readinessProbe:
  tcpSocket:
    port: 8123
  initialDelaySeconds: 60
  periodSeconds: 15
  failureThreshold: 5

startupProbe:
  tcpSocket:
    port: 8123
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 60
