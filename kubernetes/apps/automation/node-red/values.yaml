# --------------------
# Node-RED
#   - Repo:           https://github.com/node-red/node-red
#   - Docs:           https://nodered.org/docs/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1
revisionHistoryLimit: 0
strategy:
  type: Recreate

image:
  repository: docker.io/nodered/node-red
  tag: 5.0.0
  pullPolicy: Always

hostNetwork: true

ports:
  - containerPort: 1880
    name: http
    protocol: TCP
    service: true

# Uses ports from .ports section, if service is true
service:
  enabled: true

volumeMounts:
  - name: data
    mountPath: /data

volumes:
  - name: data
    mountPvc: true
# - name: ssh-keys
#   secret:
#     defaultMode: 256
#     secretName: ssh-keys-secret

pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi

ingress:
  enabled: true
  authelia: true
  className: "nginx"
  tls:
    - secretName: local-wildcard-cert
  # Will assume the first element in .ports, regardless of service
  hosts:
    - host: node-red.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

podSecurityContext:
  fsGroup: 1000

nodeSelector:
  kubernetes.io/hostname: k3s-m1

tolerations: []

affinity: {}

resources:
  limits:
    cpu: 50m
    memory: 192Mi
  requests:
    cpu: 25m
    memory: 96Mi

livenessProbe:
  httpGet:
    path: /
    port: 1880
  initialDelaySeconds: 90
  periodSeconds: 15
  failureThreshold: 5

readinessProbe:
  httpGet:
    path: /
    port: 1880
  initialDelaySeconds: 45
  periodSeconds: 10
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /
    port: 1880
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 30
