# --------------------
# Uptime Kuma
#   - Repo:           https://github.com/louislam/uptime-kuma
#   - Docs:           https://uptime.kuma.pet/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
replicas: 1
revisionHistoryLimit: 0
strategy:
  type: Recreate

image:
  repository: docker.io/louislam/uptime-kuma
  tag: 2.4.0
  pullPolicy: Always

ports:
  - containerPort: 3001
    name: http
    protocol: TCP
    service: true

# Uses ports from .ports section, if service is true
service:
  enabled: true

volumeMounts:
  - name: data
    mountPath: /app/data

volumes:
  - name: data
    mountPvc: true

pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

ingress:
  enabled: true
  authentik: true
  className: "nginx"
  annotations:
  tls:
    - secretName: status-cert

  # Will assume the first element in .ports, regardless of service
  hosts:
    - host: status.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

resources:
  limits:
    cpu: 50m
    memory: 256Mi
  requests:
    cpu: 25m
    memory: 128Mi

livenessProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 30
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 15
  periodSeconds: 10
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /
    port: 3001
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 30
