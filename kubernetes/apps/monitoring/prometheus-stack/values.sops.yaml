grafana:
    enabled: false
kubernetesServiceMonitors:
    enabled: true
## Component scraping the kube api server
##
kubeApiServer:
    enabled: true
## Component scraping the kubelet and kubelet-hosted cAdvisor
##
kubelet:
    enabled: true
## Component scraping the kube controller manager
##
kubeControllerManager:
    enabled: false
## Component scraping coreDns. Use either this or kubeDns
##
coreDns:
    enabled: true
## Component scraping etcd
##
kubeEtcd:
    enabled: false
    endpoints: []
## Component scraping kube scheduler
##
kubeScheduler:
    enabled: false
## Component scraping kube proxy
##
kubeProxy:
    enabled: false
## Component scraping kube state metrics
##
kubeStateMetrics:
    enabled: true
## Deploy node exporter as a daemonset to all nodes
##
nodeExporter:
    enabled: true
prometheus-node-exporter:
    prometheus:
        monitor:
            enabled: true
            jobLabel: jobLabel
## Manages Prometheus and Alertmanager components
##
prometheusOperator:
    enabled: true
    kubeletEndpointsEnabled: false
    kubeletEndpointSliceEnabled: true
## Deploy a Prometheus instance
##
prometheus:
    enabled: true
    ingress:
        enabled: true
        ingressClassName: nginx
        annotations:
            nginx.ingress.kubernetes.io/auth-method: GET
            nginx.ingress.kubernetes.io/auth-url: http://authelia.ingress.svc.cluster.local/api/verify
            nginx.ingress.kubernetes.io/auth-signin: ENC[AES256_GCM,data:AnuEDt3oOWMsu0IZ8/Y8tw6OW9ec18y9Rt8zEimTTBvAL2fHJ+lLBT7kc0L2,iv:Tv73rnWXgocxKnz/XivAmZKuK+SuJpMUXmJAO3Als9I=,tag:SBvZaXZJcu0jGd0cMTVqAg==,type:str]
            nginx.ingress.kubernetes.io/auth-response-headers: Remote-User,Remote-Name,Remote-Groups,Remote-Email
            nginx.ingress.kubernetes.io/auth-snippet: proxy_set_header X-Forwarded-Method $request_method;
        hosts:
            - ENC[AES256_GCM,data:fCdUcGk/6mMmgHO405U/wlBmutMSdOhxSifKDE2K,iv:WbJ2PjR/6PVd4KqmAmPlOWYU1anLUBXfC4Zo1QQUzoc=,tag:SIJzvd0q1zu3aslf+DWTmw==,type:str]
        tls:
            - secretName: local-wildcard-cert
    prometheusSpec:
        retention: 10d
        retentionSize: 20GiB
        walCompression: true
        logLevel: info
        resources:
            requests:
                cpu: 100m
                memory: 256Mi
                # limits:
                #   cpu: 2
                #   memory: 4Gi
        storageSpec:
            volumeClaimTemplate:
                spec:
                    storageClassName: longhorn-persistent
                    accessModes:
                        - ReadWriteOnce
                    resources:
                        requests:
                            storage: 25Gi
        ## List of scrape classes to expose to scraping objects such as
        ## PodMonitors, ServiceMonitors, Probes and ScrapeConfigs.
        ##
        scrapeClasses:
            - name: cluster-relabeling
              default: true
              relabelings:
                - action: replace
                  targetLabel: cluster
                  replacement: k3s-cluster
                - action: replace
                  sourceLabels:
                    - __meta_kubernetes_pod_node_name
                  targetLabel: hostname
                # 2. Fallback to endpoint node name if hostname is still empty
                - action: replace
                  sourceLabels:
                    - hostname
                    - __meta_kubernetes_endpoint_node_name
                  separator: ;
                  regex: ^;(.+)$
                  replacement: $1
                  targetLabel: hostname
