secret:
    stringData:
        PING_KEY: ENC[AES256_GCM,data:Ys+dRCEdaOd1ewkQdWFP67bh2cNZ6g==,iv:1YKH16Kw4JHGusmAUc2+0zW0UGAny7moRQre8clZgAk=,tag:xlRE2oIFnRatTQ5HPW6oaA==,type:str]
cronjobs:
    - name: cluster-heartbeat
      schedule: '* * * * *'
      concurrencyPolicy: Forbid
      successfulJobsHistoryLimit: 1
      failedJobsHistoryLimit: 1
      backoffLimit: 0
      env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
                fieldPath: spec.nodeName
      restartPolicy: Never
      image:
        repository: curlimages/curl
        tag: 8.16.0
      command:
        - sh
        - -c
      args:
        - |
          sleep 2
          curl -vfsS \
          --data-raw=${NODE_NAME} \
          https://hc-ping.com/${PING_KEY}/k3s-cluster
