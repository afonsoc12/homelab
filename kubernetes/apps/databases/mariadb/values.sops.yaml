labels:
    tier: db
    # label_2: def
podAnnotations: {}
# annot_1: abc
# annot_2: def
replicas: 1
revisionHistoryLimit: 0
strategy:
    type: Recreate
image:
    repository: docker.io/mariadb
    tag: 12.2.2
#   pullPolicy: Always
command: {}
args: {}
ports:
    - containerPort: 3306
      name: mysql
      protocol: TCP
      service: true
    - containerPort: 9104
      name: metrics
      protocol: TCP
      service: true
service:
    enabled: true
    type: LoadBalancer
    loadBalancerIP: ENC[AES256_GCM,data:uc5zRz/F2s3odI4=,iv:27HSXVlSoGmf694GIoxnkUxxkZNF5Xteuv54UBPDcvI=,tag:MxmFdoXzViWOSN9Q+lF+2w==,type:str]
    annotations:
        metallb.universe.tf/allow-shared-ip: db-svc
secret:
    stringData:
        MYSQL_ROOT_PASSWORD: ENC[AES256_GCM,data:hTi6Z++v8JWArWHT7XVteRxyBpg=,iv:5YGhq4mda4CtxDEY7G+wZC7eohp2RAuq+ZGR7HEz+rI=,tag:viBWqFcb4UMOlg3hMid22g==,type:str]
        MYSQLD_EXPORTER_PASSWORD: ENC[AES256_GCM,data:X5/bqsKjPIm1uYC8sXgOxS/xXVE=,iv:84RStmIezmBPvi4U0JzGpcm7Srdm2PFNDDALrkZ8800=,tag:fdqrYAozTGgxHf3SkNA9fg==,type:str]
configmap: {}
# config_1: abc
# config_2: def
volumeMounts:
    - name: data
      mountPath: /var/lib/mysql
volumeClaimTemplates:
    - name: data
      accessModes:
        - ReadWriteOnce
      storageClass: longhorn-persistent
      storage: 10Gi
