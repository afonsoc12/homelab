#       - /bin/bash
#       - -ec
#       - |
#         password_aux="${MYSQL_ROOT_PASSWORD:-}"
#         if [[ -f "${MYSQL_ROOT_PASSWORD_FILE:-}" ]]; then
#             password_aux=$(cat "$MYSQL_ROOT_PASSWORD_FILE")
#         fi
#         mysqladmin status -uroot -p"${password_aux}"
resources:
    limits:
        cpu: 1
        memory: 1Gi
    requests:
        cpu: 50m
        memory: 128Mi
podSecurityContext: {}
# fsGroup: 2000
securityContext: {}
# capabilities:
#   drop:
#   - ALL
# readOnlyRootFilesystem: true
# runAsNonRoot: true
# runAsUser: 1000
nodeSelector: {}
tolerations: []
affinity: {}
extraContainers:
    - name: mysqld-exporter
      image: docker.io/prom/mysqld-exporter:v0.19.0
      ports:
        - containerPort: 9104
          name: metrics
          protocol: TCP
      env:
        - name: MYSQLD_EXPORTER_PASSWORD
          valueFrom:
            secretKeyRef:
                name: mariadb
                key: MYSQLD_EXPORTER_PASSWORD
      args:
        - --mysqld.address=localhost:3306
        - --mysqld.username=mysqld_exporter
        - --collect.global_status
        - --collect.global_variables
        - --collect.info_schema.innodb_metrics
        - --collect.info_schema.processlist
        - --collect.info_schema.tables
        - --collect.perf_schema.eventsstatements
        # - --collect.slave_status
        # - --collect.auto_increment.columns
        # - --collect.binlog_size
        # - --collect.perf_schema.tableiowaits
        # - --collect.perf_schema.tablelocks
backup:
    enabled: true
    schedule: 0 3 * * *
    rootPasswordKey: MYSQL_ROOT_PASSWORD
    concurrencyPolicy: Forbid
    successfulJobsHistoryLimit: 1
    failedJobsHistoryLimit: 1
    config:
        MODE: MANUAL
        MANUAL_RUN_FOREVER: "FALSE"
        CONTAINER_ENABLE_SCHEDULING: "FALSE"
        CONTAINER_ENABLE_MONITORING: "FALSE"
        DB_TYPE: mariadb
        DB_HOST: mariadb
        DB_NAME: ALL
        DB_NAME_EXCLUDE: '#mysql50#lost+found,information_schema,mysql,performance_schema,sys'
        DB_USER: root
        DB_DUMP_FREQ: "1440"
        # 3 months
        DB_CLEANUP_TIME: "129600"
        CHECKSUM: SHA1
        COMPRESSION: GZ
        GZ_RSYNCABLE: "TRUE"
    affinity:
        podAffinity:
            requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchExpressions:
                        - key: tier
                          operator: In
                          values:
                            - db
                  topologyKey: kubernetes.io/hostname
