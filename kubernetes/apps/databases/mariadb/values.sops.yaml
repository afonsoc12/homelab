# --------------------
# MariaDB
#   - Repo:           https://github.com/MariaDB/server
#   - Docs:           https://mariadb.org/documentation/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/database-svc/values.yaml
