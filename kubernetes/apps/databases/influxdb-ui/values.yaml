# --------------------
# InfluxDB 3 Explorer
#   - Repo:           https://github.com/influxdata/influxdb3-ui
#   - Docs:           https://docs.influxdata.com/influxdb3/explorer/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
---
image:
  repository: docker.io/influxdata/influxdb3-ui
  tag: 1.9.0
  pullPolicy: IfNotPresent

restartPolicy: Always
command: {}
args: {}

ports:
  - containerPort: 8080
    name: http
    protocol: TCP
    service: true

service:
  enabled: true

# config.json (with the admin token) is rendered into the chart Secret via
# values.sops.yaml (secret.stringData) and mounted read-only here.
volumeMounts:
  - name: config
    mountPath: /app-root/config
    readOnly: true
  - name: db
    mountPath: /db

volumes:
  - name: config
    secret:
      secretName: influxdb-ui
  - name: db
    mountPvc: true

pvc:
  storageClassName: longhorn-persistent
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

ingress:
  enabled: true
  authelia: true
  className: nginx
  annotations: {}
  tls:
    - secretName: local-wildcard-cert
  # Will assume the first element in .ports, regardless of service
  hosts:
    - host: influxdb.local.{{ .Values.domain }}
      paths:
        - path: /
          pathType: Prefix

livenessProbe:
  tcpSocket:
    port: 8080
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

readinessProbe:
  tcpSocket:
    port: 8080
  periodSeconds: 10
  failureThreshold: 3
  timeoutSeconds: 5

startupProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 18
  timeoutSeconds: 5

resources:
  requests:
    memory: 64Mi
    cpu: 25m
  limits:
    memory: 256Mi
    cpu: 100m

podSecurityContext: {}
securityContext: {}

nodeSelector: {}
tolerations: []
affinity: {}
