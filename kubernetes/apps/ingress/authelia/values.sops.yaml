# --------------------
# Authelia
#   - Repo:           https://github.com/authelia/authelia
#   - Docs:           https://www.authelia.com/
#   - Chart Defaults: https://github.com/afonsoc12/homelab/blob/master/kubernetes/charts/homelab-svc/values.yaml
# --------------------
labels: {}
# label_1: abc
# label_2: def
replicas: 2
image:
    repository: docker.io/authelia/authelia
    tag: 4.39.20
ports:
    - containerPort: 9091
      service: true
# Uses ports from .ports section, if service is true
service:
    enabled: true
    port: 80
volumeMounts:
    - name: config
      mountPath: /config
      # readOnly: true
volumes:
    - name: config
      configMap:
        name: authelia
ingress:
    enabled: true
    # Don't enable authelia on itself
    authelia: false
    className: nginx
    annotations: {}
    # nginx.ingress.kubernetes.io/client-max-body-size: "0"
    # nginx.ingress.kubernetes.io/proxy-body-size: "0"
    tls:
        - secretName: auth-cert
    hosts:
        - host: auth.mydata247.top
          paths:
            - path: /
              pathType: Prefix
livenessProbe:
    httpGet:
        path: /verify
        port: 9091
    initialDelaySeconds: 5
    periodSeconds: 10
readinessProbe:
    httpGet:
        path: /verify
        port: 9091
    initialDelaySeconds: 5
    periodSeconds: 10
startupProbe:
    httpGet:
        path: /verify
        port: 9091
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 18
    timeoutSeconds: 5
resources:
    limits:
        cpu: 100m
        memory: 128Mi
    requests:
        cpu: 20m
        memory: 64Mi
affinity:
    podAffinity:
        preferredDuringSchedulingIgnoredDuringExecution:
            - podAffinityTerm:
                labelSelector:
                    matchExpressions:
                        - key: app.kubernetes.io/instance
                          operator: In
                          values:
                            - mariadb
                namespaceSelector: {}
                topologyKey: kubernetes.io/hostname
              weight: 1
configmap:
    mountEnv: false
    data:
        configuration.yml: ENC[AES256_GCM,data:,iv:GY+PppDe0ZMvbOemO4XFCUsF23IN2AXD98QbEA8D/nE=,tag:pKAFEg7wMlQULtqo5zIbhg==,type:str]
