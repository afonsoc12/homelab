    redis:
        host: ENC[AES256_GCM,data:n/wlfMBjeFrWBTHHyGl4,iv:2bMBzaWqorDqkFv9L+FRIsSfc8MnHoPJV5ZissINzLY=,tag:5j6vkk/rVyHtU79G3S79kQ==,type:str]
## authentik server
server:
    name: server
    replicas: 1
    ingress:
        enabled: true
        ingressClassName: nginx
        hosts:
            - ENC[AES256_GCM,data:ztVKubsoWYA/lWPNfcsSkh4=,iv:8AUzHd3pxzhNdEMs3VXV3ULVja3QxoccYNh1oiRUXpA=,tag:ysKtrC4yznEciYWUbSY3PA==,type:str]
        paths:
            - /
        pathType: Prefix
        tls:
            - secretName: sso-cert
        extraPaths:
            - backend:
                service:
                    name: authentik-embedded-outpost
                    port:
                        number: 9000
              path: /outpost.goauthentik.io
              pathType: Prefix
worker:
    name: worker
    replicas: 1
serviceAccount:
    create: true
prometheus:
    rules:
        enabled: false
        # -- PrometheusRule namespace
        namespace: ""
        # -- PrometheusRule selector
        selector: {}
        # prometheus: kube-prometheus
        # -- PrometheusRule labels
        labels: {}
        # -- PrometheusRule annotations
        annotations: {}
postgresql:
    enabled: false
redis:
    enabled: false
