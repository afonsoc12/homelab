---
image:
  repository: nginx
  tag: 1.29.8
  pullPolicy: IfNotPresent

replicas: 1

ports:
  - containerPort: 32400
    name: plex
    protocol: TCP
    service: true
    nodePort: 32400

service:
  enabled: true
  type: NodePort
  externalTrafficPolicy: Local

nodeSelector:
  kubernetes.io/hostname: k3s-oci-m3

configmap:
  mountEnv: false
  data:
    # yamllint disable rule:line-length
    default.conf: |
      server {
          listen 32400 ssl;
          server_name plex.{{ .Values.domain }};

          access_log /dev/stdout;
          error_log /dev/stderr;

          ssl_certificate     /etc/nginx/tls/tls.crt;
          ssl_certificate_key /etc/nginx/tls/tls.key;
          ssl_session_cache   shared:SSL:10m;
          ssl_session_timeout 1d;
          ssl_session_tickets off;
          ssl_protocols       TLSv1.2 TLSv1.3;
          ssl_prefer_server_ciphers on;
          ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
          ssl_ecdh_curve      X25519:secp384r1;


          add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
          add_header X-Content-Type-Options nosniff always;
          add_header X-Frame-Options SAMEORIGIN always;

          send_timeout         100m;
          client_max_body_size 0;

          gzip on;
          gzip_vary on;
          gzip_min_length 1000;
          gzip_proxied any;
          gzip_types text/plain text/css text/xml application/xml text/javascript application/x-javascript image/svg+xml;
          gzip_disable "MSIE [1-6]\.";

          proxy_http_version   1.1;
          proxy_redirect       off;
          proxy_buffering      off;
          proxy_set_header Host              $host;
          proxy_set_header X-Real-IP         $remote_addr;
          proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_set_header Upgrade           $http_upgrade;
          proxy_set_header Connection        "upgrade";
          proxy_set_header Accept-Encoding   "";

          location / {
              proxy_pass https://{{ .Values.ips_tailscale.hoarder }}:32400;
              proxy_ssl_verify off;
              proxy_connect_timeout 5s;
              proxy_read_timeout 86400s;
              error_page 502 503 504 = @upstream_down;
              proxy_set_header X-Plex-Client-Identifier $http_x_plex_client_identifier;
              proxy_set_header X-Plex-Device $http_x_plex_device;
              proxy_set_header X-Plex-Device-Name $http_x_plex_device_name;
              proxy_set_header X-Plex-Platform $http_x_plex_platform;
              proxy_set_header X-Plex-Platform-Version $http_x_plex_platform_version;
              proxy_set_header X-Plex-Product $http_x_plex_product;
              proxy_set_header X-Plex-Token $http_x_plex_token;
              proxy_set_header X-Plex-Version $http_x_plex_version;
              proxy_set_header X-Plex-Nocache $http_x_plex_nocache;
              proxy_set_header X-Plex-Provides $http_x_plex_provides;
              proxy_set_header X-Plex-Device-Vendor $http_x_plex_device_vendor;
              proxy_set_header X-Plex-Model $http_x_plex_model;
          }

          location /library/streams/ {
              proxy_pass https://{{ .Values.ips_tailscale.hoarder }}:32400;
              proxy_ssl_verify off;
              proxy_pass_request_headers off;
          }

          location @upstream_down {
              default_type text/html;
              return 503 '<html><body><h1>Plex is offline</h1><p>The media server is currently unreachable.</p></body></html>';
          }
      }
    # yamllint enable rule:line-length

volumeMounts:
  - name: nginx-config
    mountPath: /etc/nginx/conf.d/default.conf
    subPath: default.conf
    readOnly: true
  - name: tls
    mountPath: /etc/nginx/tls
    readOnly: true

volumes:
  - name: nginx-config
    configMap:
      name: plex-relay
      items:
        - key: default.conf
          path: default.conf
  - name: tls
    secret:
      secretName: plex-cert

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 64Mi
