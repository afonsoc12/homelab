<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Homelab Rack Banner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0b0d;
    --cyan:#56e0ff;
    --ink:#e9edf2;
    --dim:#6b7380;
  }
  html,body{margin:0;padding:0;background:var(--bg);font-family:"JetBrains Mono",ui-monospace,monospace;color:var(--ink);}
  body{display:flex;align-items:flex-start;justify-content:center;}
  .frame{
    width:min(820px,100%);
    aspect-ratio:820/400;
    position:relative;
    border-radius:14px;
    overflow:hidden;
    background:
      radial-gradient(820px 600px at 20% 120%, rgba(86,224,255,.08), transparent 60%),
      radial-gradient(700px 500px at 90% -20%, rgba(178,140,255,.07), transparent 60%),
      linear-gradient(180deg,#0c0e12 0%,#07080a 100%);
    box-shadow:0 30px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(255,255,255,.04) inset;
  }
  .frame::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
    background-size:40px 40px;
    mask-image:radial-gradient(ellipse at 50% 60%, black 40%, transparent 80%);
  }
  .floor{
    position:absolute;left:0;right:0;bottom:0;height:64px;
    background:linear-gradient(180deg,transparent,rgba(86,224,255,.05) 30%,rgba(86,224,255,.02));
    border-top:1px solid rgba(255,255,255,.04);
  }
  .stage{position:absolute;inset:0;}
  .stage svg{display:block;width:100%;height:100%;}
  .corner{
    position:absolute;font-size:10px;letter-spacing:.18em;
    color:var(--dim);text-transform:uppercase;
  }
  .c-tl{top:16px;left:20px;}
  .c-tr{top:16px;right:20px;}
  .c-bl{bottom:16px;left:20px;}
  .dot{display:inline-block;width:6px;height:6px;border-radius:50%;
       background:var(--cyan);box-shadow:0 0 8px var(--cyan);margin-right:8px;vertical-align:1px;}

  @keyframes blink  { 0%,60%{opacity:1}  70%,100%{opacity:.15} }
  @keyframes blink2 { 0%,40%{opacity:.15} 50%,100%{opacity:1}  }

  @media (max-width:600px){
    .corner { font-size:8px; }
    #stats  { display:none; }
  }
</style>
</head>
<body>
  <div class="frame" id="banner">
    <div class="corner c-tl"><span class="dot"></span>HOMELAB</div>
    <div class="corner c-tr">19" · 16U · ONLINE</div>
    <div class="corner c-bl">PWR · NET · TEMP 22°C</div>
    <div class="floor"></div>
    <div class="stage" id="stage"></div>
  </div>

<script>
/* ── Tweaks ─────────────────────────────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "cables":"cool","showCallouts":true,"showGrid":true
}/*EDITMODE-END*/;
window.__tweaks = {...TWEAK_DEFAULTS};
window.__cablePalette = function(){
  const m = window.__tweaks.cables;
  if(m==='mono')    return new Array(8).fill('#56e0ff');
  if(m==='twotone') return ['#56e0ff','#b28cff'];
  if(m==='warm')    return ['#ff6b7a','#ffb23f','#ffe26a','#ff7fd5'];
  if(m==='cool')    return ['#56e0ff','#7dffb0','#6aa6ff','#b28cff'];
  return ['#ff6b7a','#ffb23f','#ffe26a','#7dffb0','#56e0ff','#6aa6ff','#b28cff','#ff7fd5'];
};

/* ── Layout constants ────────────────────────────────────────────── */
const RACK_X = 188;
const RACK_Y = 40;
const RACK_W = 280;
const RACK_H = 276;
const INNER_PAD_X = 18;
const INNER_PAD_Y = 16;
const U = 16;
const INNER_X = RACK_X + INNER_PAD_X;
const INNER_Y = RACK_Y + INNER_PAD_Y;
const INNER_W = RACK_W - INNER_PAD_X*2;  // 244
const INNER_H = RACK_H - INNER_PAD_Y*2;  // 288

const modules = [
  {kind:'screen',  u:2},
  {kind:'gap',     u:.25},
  {kind:'udm',     u:1},
  {kind:'gap',     u:.15},
  {kind:'switch',  u:1},
  {kind:'gap',     u:.15},
  {kind:'patch',   u:1},
  {kind:'gap',     u:.4},
  {kind:'server1', u:2},
  {kind:'gap',     u:.15},
  {kind:'m700',    u:2},
  {kind:'gap',     u:.15},
  {kind:'server2', u:1},
  {kind:'gap',     u:.4},
  {kind:'ups',     u:2},
];

/* ── SVG scaffold ───────────────────────────────────────────────── */
const ns = "http://www.w3.org/2000/svg";
const svg = document.createElementNS(ns,"svg");
svg.setAttribute("viewBox","0 0 820 400");
svg.setAttribute("preserveAspectRatio","xMidYMid meet");
document.getElementById("stage").appendChild(svg);

const defs = document.createElementNS(ns,"defs");
defs.innerHTML = `
  <linearGradient id="rackFrame" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0"  stop-color="#23262d"/>
    <stop offset=".5" stop-color="#181a1f"/>
    <stop offset="1"  stop-color="#0f1115"/>
  </linearGradient>
  <linearGradient id="rackInner" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#090a0c"/>
    <stop offset="1" stop-color="#0d0f13"/>
  </linearGradient>
  <linearGradient id="faceplate" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#1b1e24"/>
    <stop offset="1" stop-color="#13161b"/>
  </linearGradient>
  <linearGradient id="faceplateLite" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#24282f"/>
    <stop offset="1" stop-color="#171a20"/>
  </linearGradient>
  <linearGradient id="screenGlow" x1="0" x2="0" y1="0" y2="1">
    <stop offset="0" stop-color="#0b2a33"/>
    <stop offset="1" stop-color="#061319"/>
  </linearGradient>
  <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="1.2" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
`;
svg.appendChild(defs);

function el(tag, attrs={}, parent=svg){
  const e = document.createElementNS(ns, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  parent.appendChild(e);
  return e;
}
function g(attrs={}, parent=svg){ return el('g', attrs, parent); }

/* ── Rack outer frame ───────────────────────────────────────────── */
el('rect',{x:RACK_X-8,   y:RACK_Y+RACK_H,    width:RACK_W+16, height:8,  rx:2, fill:'#050608'});
el('rect',{x:RACK_X-10,  y:RACK_Y+RACK_H-4,  width:RACK_W+20, height:10, rx:2, fill:'#1a1d22',stroke:'#272b33','stroke-width':1});
el('rect',{x:RACK_X,     y:RACK_Y,            width:RACK_W,    height:RACK_H, rx:6, fill:'url(#rackFrame)',stroke:'#2b2f37','stroke-width':1});
el('rect',{x:INNER_X,    y:INNER_Y,           width:INNER_W,   height:INNER_H, rx:2, fill:'url(#rackInner)',stroke:'#05060a','stroke-width':1});
el('rect',{x:INNER_X-4,  y:INNER_Y,           width:4,         height:INNER_H, fill:'#202329'});
el('rect',{x:INNER_X+INNER_W, y:INNER_Y,      width:4,         height:INNER_H, fill:'#202329'});
for(let i=0;i<18;i++){
  const cy = INNER_Y + 8 + i*16;
  el('circle',{cx:INNER_X-2,         cy, r:1, fill:'#0a0b0d'});
  el('circle',{cx:INNER_X+INNER_W+2, cy, r:1, fill:'#0a0b0d'});
}

/* ── Module slot layout ─────────────────────────────────────────── */
let _y = INNER_Y + 6;
const slots = {};
for(const m of modules){
  const h = m.u * U;
  if(m.kind==='gap'){ _y += h; continue; }
  slots[m.kind] = {x:INNER_X, y:_y, w:INNER_W, h};
  _y += h;
}

/* ── Screen panel (2U) ──────────────────────────────────────────── */
function drawScreen(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:2,fill:'url(#faceplateLite)',stroke:'#2b2f37','stroke-width':.75},r);
  el('rect',{x:6,y:4,width:s.w-12,height:s.h-8,rx:2,fill:'#0a0b0e',stroke:'#1f2229','stroke-width':.5},r);
  const sw=s.w-40, sh=s.h-14, sx=(s.w-sw)/2, sy=7;
  el('rect',{x:sx,y:sy,width:sw,height:sh,rx:1.5,fill:'url(#screenGlow)'},r);
  const cg = g({transform:`translate(${sx+4},${sy+3})`},r);
  const cw=sw-8, ch=sh-6;
  el('line',{x1:0,y1:ch-1,x2:cw,y2:ch-1,stroke:'#0e3540','stroke-width':.5},cg);
  el('line',{x1:0,y1:ch/2,x2:cw,y2:ch/2,stroke:'#0e3540','stroke-width':.3,'stroke-dasharray':'2 2'},cg);
  for(let i=0;i<14;i++){
    const bh=2+Math.abs(Math.sin(i*1.3))*ch*0.55+(i%3)*1.2;
    el('rect',{x:i*3,y:ch-bh,width:1.6,height:bh,fill:'#0f4a58'},cg);
  }
  let d=`M 0 ${ch*0.7}`;
  for(let i=1;i<=22;i++){
    const px=(i/22)*cw, py=ch*0.35+Math.sin(i*0.6)*ch*0.18+(i%4)*1.5;
    d+=` L ${px.toFixed(1)} ${py.toFixed(1)}`;
  }
  el('path',{d,fill:'none',stroke:'#56e0ff','stroke-width':1,filter:'url(#softGlow)'},cg);
  el('rect',{x:cw-22,y:1,width:20,height:5,rx:1,fill:'#0e3540'},cg);
  el('circle',{cx:cw-19,cy:3.5,r:1,fill:'#7dffb0'},cg);
  el('circle',{cx:s.w-10,cy:s.h-5,r:1.2,fill:'#56e0ff',filter:'url(#softGlow)'},r);
}
drawScreen(slots.screen);

/* ── UDM Pro (1U) ───────────────────────────────────────────────── */
function drawUDM(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplate)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:6,y:3,width:12,height:s.h-6,rx:1,fill:'#0a1c22',stroke:'#124652','stroke-width':.5},r);
  el('rect',{x:8,y:5,width:8,height:2,fill:'#56e0ff',opacity:.7},r);
  el('rect',{x:8,y:8,width:6,height:1,fill:'#1d5763'},r);
  for(let i=0;i<18;i++) el('rect',{x:24+i*4,y:5,width:2,height:s.h-10,fill:'#0a0b0e'},r);
  for(let i=0;i<8;i++){
    el('rect',{x:104+i*10,y:4,width:8,height:s.h-8,rx:1,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.4},r);
    el('circle',{cx:104+i*10+4,cy:s.h-3,r:.8,fill:i<3?'#7dffb0':(i===3?'#ffb23f':'#2a2e35')},r);
  }
  el('rect',{x:186,y:4,width:8,height:s.h-8,rx:1,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.4},r);
  el('circle',{cx:s.w-8,cy:s.h/2,r:1.5,fill:'#56e0ff',filter:'url(#softGlow)'},r);
  const b=el('circle',{cx:18,cy:s.h-3,r:.9,fill:'#7dffb0'},r);
  b.style.animation='blink 1.6s infinite';
}
drawUDM(slots.udm);

/* ── Switch (1U) ────────────────────────────────────────────────── */
function drawSwitch(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplate)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('circle',{cx:3,cy:3,r:1,fill:'#0a0b0d'},r);
  el('circle',{cx:3,cy:s.h-3,r:1,fill:'#0a0b0d'},r);
  el('circle',{cx:10,cy:s.h/2,r:1.2,fill:'#7dffb0',filter:'url(#softGlow)'},r);
  const pw=6, ph=5, gap=.5;
  const switchPorts=[];
  for(let row=0;row<2;row++){
    for(let i=0;i<24;i++){
      const x=18+i*(pw+gap), y=3+row*(ph+1);
      el('rect',{x,y,width:pw,height:ph,rx:.5,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.3},r);
      if(Math.random()>.55){
        const c=['#7dffb0','#ffb23f','#56e0ff'][i%3];
        const led=el('circle',{cx:x+pw/2,cy:y+ph/2,r:.6,fill:c,opacity:.8},r);
        if(i%5===0) led.style.animation=`blink ${1+Math.random()}s infinite`;
      }
      if(row===0) switchPorts.push({x:s.x+x+pw/2, y:s.y+y});
    }
  }
  window.__switchPorts=switchPorts;
  const sfpX=18+24*(pw+gap)+4;
  for(let i=0;i<4;i++) el('rect',{x:sfpX+i*8,y:2,width:7,height:s.h-4,rx:.5,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.3},r);
}
drawSwitch(slots.switch);

/* ── Patch panel (1U) ───────────────────────────────────────────── */
function drawPatch(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplateLite)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:s.w-6,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('circle',{cx:3,cy:3,r:.9,fill:'#0a0b0d'},r);
  el('circle',{cx:3,cy:s.h-3,r:.9,fill:'#0a0b0d'},r);
  el('circle',{cx:s.w-3,cy:3,r:.9,fill:'#0a0b0d'},r);
  el('circle',{cx:s.w-3,cy:s.h-3,r:.9,fill:'#0a0b0d'},r);
  el('rect',{x:8,y:1.5,width:s.w-16,height:2,fill:'#0b0c10'},r);
  const palette=(window.__cablePalette&&window.__cablePalette())||['#ff6b7a','#ffb23f','#ffe26a','#7dffb0','#56e0ff','#6aa6ff','#b28cff','#ff7fd5'];
  const kw=(s.w-18)/24;
  const jacks=[];
  for(let i=0;i<24;i++){
    const x=9+i*kw;
    el('rect',{x:x+.6,y:5,width:kw-1.2,height:s.h-8,rx:.6,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.3},r);
    const c=palette[i%palette.length];
    el('rect',{x:x+1.2,y:6,width:kw-2.4,height:s.h-10,rx:.4,fill:c,opacity:.95},r);
    jacks.push({x:s.x+x+kw/2, y:s.y+5, color:c});
  }
  window.__jacks=jacks;
}
drawPatch(slots.patch);

/* ── 2U server ──────────────────────────────────────────────────── */
function drawServer(s, opts={}){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplate)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:s.w-6,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('circle',{cx:12,cy:6,r:1.2,fill:'#7dffb0',filter:'url(#softGlow)'},r);
  const led2=el('circle',{cx:12,cy:s.h-6,r:1.2,fill:'#ffb23f'},r);
  led2.style.animation='blink 2.2s infinite';
  const bays=opts.bays??8, bayW=(s.w-70)/bays;
  for(let i=0;i<bays;i++){
    const x=20+i*bayW, bayH=s.h-6;
    el('rect',{x:x+.5,y:3,width:bayW-1,height:bayH,rx:.6,fill:'#0d1015',stroke:'#1a1d22','stroke-width':.4},r);
    el('rect',{x:x+2,y:3+bayH/2-.5,width:bayW-4,height:1,fill:'#2a2e36'},r);
    if(i<(opts.active??bays)) el('circle',{cx:x+bayW-2.5,cy:5,r:.6,fill:'#56e0ff'},r);
  }
  const rx0=20+bays*bayW+4;
  el('rect',{x:rx0,y:3,width:s.w-rx0-8,height:s.h-6,rx:1,fill:'#0c0e12',stroke:'#1a1d22','stroke-width':.4},r);
  for(let i=0;i<8;i++) el('rect',{x:rx0+3+i*3,y:5,width:1.2,height:s.h-10,fill:'#05060a'},r);
}

/* ── Thin server (1U) ───────────────────────────────────────────── */
function drawThinServer(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplate)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:s.w-6,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  for(let i=0;i<40;i++) el('rect',{x:10+i*4,y:4,width:2.5,height:s.h-8,fill:'#0a0b0e'},r);
  el('circle',{cx:s.w-10,cy:s.h/2-2,r:1,fill:'#7dffb0'},r);
  const l=el('circle',{cx:s.w-10,cy:s.h/2+2,r:1,fill:'#56e0ff'},r);
  l.style.animation='blink2 1.4s infinite';
}

/* ── M700 shelf (2U) ────────────────────────────────────────────── */
function drawM700Shelf(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'#0d0f13',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:s.w-6,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:6,y:s.h-2,width:s.w-12,height:1,fill:'#1a1d22'},r);
  const areaW=s.w-28, areaH=s.h-6, pcW=(areaW-12)/3;
  for(let i=0;i<3;i++){
    const x=14+i*(pcW+6);
    const pc=g({transform:`translate(${x},3)`},r);
    el('rect',{x:0,y:0,width:pcW,height:areaH,rx:1.5,fill:'#1a1d22',stroke:'#2c3039','stroke-width':.5},pc);
    el('line',{x1:0,y1:2,x2:pcW,y2:2,stroke:'#262a31','stroke-width':.4},pc);
    el('rect',{x:1.5,y:3,width:pcW-3,height:areaH-5,rx:1,fill:'#0d1014'},pc);
    el('circle',{cx:pcW/2,cy:6,r:1.2,fill:'#0a0b0d',stroke:'#2a2e35','stroke-width':.3},pc);
    el('circle',{cx:pcW/2,cy:6,r:.5,fill:'#7dffb0',filter:'url(#softGlow)'},pc);
    el('rect',{x:3,y:10,width:pcW-6,height:1,fill:'#05060a'},pc);
    const act=el('circle',{cx:pcW-3,cy:areaH-3,r:.6,fill:'#56e0ff'},pc);
    act.style.animation=`blink ${1.2+i*.3}s infinite`;
    el('rect',{x:3,y:areaH-6,width:pcW-6,height:1,fill:'#1f2329'},pc);
  }
}

drawServer(slots.server1,{bays:8,active:6});
drawM700Shelf(slots.m700);
drawThinServer(slots.server2);

/* ── UPS (2U) ───────────────────────────────────────────────────── */
function drawUPS(s){
  const r = g({transform:`translate(${s.x},${s.y})`});
  el('rect',{x:0,y:0,width:s.w,height:s.h,rx:1.5,fill:'url(#faceplate)',stroke:'#2a2e35','stroke-width':.75},r);
  el('rect',{x:0,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  el('rect',{x:s.w-6,y:0,width:6,height:s.h,fill:'#1d2026'},r);
  const dw=40, dh=s.h-10;
  el('rect',{x:12,y:5,width:dw,height:dh,rx:1,fill:'#0a1c22',stroke:'#124652','stroke-width':.5},r);
  for(let i=0;i<5;i++) el('rect',{x:15+i*7,y:5+dh-5,width:5,height:2,fill:i<4?'#7dffb0':'#2a3a3f'},r);
  el('text',{x:32,y:12,'text-anchor':'middle','font-family':'JetBrains Mono','font-size':5,fill:'#56e0ff','font-weight':700},r).textContent='100%';
  el('text',{x:32,y:19,'text-anchor':'middle','font-family':'JetBrains Mono','font-size':3.5,fill:'#2a8092'},r).textContent='230V · 42min';
  for(let i=0;i<6;i++){
    const x=60+i*11;
    el('rect',{x,y:4,width:10,height:s.h-8,rx:1,fill:'#0a0b0d',stroke:'#1a1d22','stroke-width':.4},r);
    el('circle',{cx:x+5,cy:7,r:.8,fill:'#05060a'},r);
    el('rect',{x:x+2.5,y:4+(s.h-8)/2,width:5,height:1.2,fill:'#05060a'},r);
    el('rect',{x:x+4.4,y:4+s.h-12,width:1.2,height:2,fill:'#05060a'},r);
  }
  const bx=s.w-20;
  el('circle',{cx:bx,cy:s.h/2,r:5,fill:'#0d1015',stroke:'#2a2e35','stroke-width':.6},r);
  el('circle',{cx:bx,cy:s.h/2,r:2.8,fill:'#162a30',stroke:'#1d4652','stroke-width':.5},r);
  el('path',{d:`M ${bx} ${s.h/2-1.8} L ${bx} ${s.h/2+.6}`,stroke:'#56e0ff','stroke-width':1,'stroke-linecap':'round',filter:'url(#softGlow)'},r);
  el('circle',{cx:bx,cy:s.h/2,r:2.8,fill:'none',stroke:'#56e0ff','stroke-width':.5,'stroke-dasharray':'1.5 1',opacity:.7,transform:`rotate(30 ${bx} ${s.h/2})`},r);
}
drawUPS(slots.ups);

/* ── Cables (patch → switch) ────────────────────────────────────── */
const cablesG = g({});
const jacks = window.__jacks||[];
const switchPorts = window.__switchPorts||[];

function cablePalette(mode){
  const rb=['#ff6b7a','#ffb23f','#ffe26a','#7dffb0','#56e0ff','#6aa6ff','#b28cff','#ff7fd5'];
  if(mode==='mono')    return new Array(24).fill('#56e0ff');
  if(mode==='twotone') return Array.from({length:24},(_,i)=>i%2?'#56e0ff':'#b28cff');
  if(mode==='warm')    return ['#ff6b7a','#ffb23f','#ffe26a','#ff7fd5'];
  return rb;
}
function drawCables(){
  cablesG.innerHTML='';
  const palette=cablePalette(window.__tweaks.cables);
  const n=Math.min(jacks.length,switchPorts.length);
  for(let i=0;i<n;i++){
    const j=jacks[i], p=switchPorts[i];
    const color=palette[i%palette.length];
    const sx=j.x, sy=j.y+6, ex=p.x, ey=p.y+6;
    const bend=3+(i%4);
    el('path',{d:`M ${sx} ${sy} C ${sx} ${sy-bend}, ${ex} ${ey+bend}, ${ex} ${ey}`,
      fill:'none',stroke:color,'stroke-width':1.1,'stroke-linecap':'round',opacity:.95,filter:'url(#softGlow)'},cablesG);
    el('rect',{x:sx-1.2,y:sy-1,width:2.4,height:2,rx:.4,fill:color,opacity:.9},cablesG);
  }
}
svg.appendChild(cablesG);

/* ── Callouts placeholder ───────────────────────────────────────── */
const anno = g({id:'callouts'});

/* ── Stats bars (desktop only, hidden on mobile via CSS) ─────────── */
{
  const stats=[
    {l:'CPU',v:.42,c:'#56e0ff'},
    {l:'MEM',v:.61,c:'#7dffb0'},
    {l:'NET',v:.28,c:'#b28cff'},
    {l:'DSK',v:.74,c:'#ffb23f'},
    {l:'PWR',v:.35,c:'#ff7fd5'},
  ];
  const sd = g({id:'stats', transform:`translate(${RACK_X+RACK_W+60},70)`});
  const barH=180, barW=10, barGap=24;
  stats.forEach((st,i)=>{
    const x=i*barGap;
    el('rect',{x,y:0,width:barW,height:barH,rx:2,fill:'#0f1218',stroke:'#1d2129','stroke-width':.5},sd);
    const segH=(barH-4)/18;
    const filled=Math.round(18*st.v);
    for(let k=0;k<18;k++){
      const on=k<filled;
      el('rect',{x:x+2,y:barH-2-(k+1)*segH+1,width:barW-4,height:segH-1,rx:.6,
        fill:on?st.c:'#131720',opacity:on?.95:1,filter:on?'url(#softGlow)':''},sd);
    }
    el('text',{x:x+barW/2,y:barH+12,'text-anchor':'middle','font-family':'JetBrains Mono',
      'font-size':7,fill:'#6b7380','letter-spacing':'.15em'},sd).textContent=st.l;
    el('text',{x:x+barW/2,y:-6,'text-anchor':'middle','font-family':'JetBrains Mono',
      'font-size':6,fill:st.c,'letter-spacing':'.1em'},sd).textContent=Math.round(st.v*100)+'%';
  });
  el('text',{x:0,y:-20,'font-family':'JetBrains Mono','font-size':7,fill:'#4a515c',
    'letter-spacing':'.2em'},sd).textContent='LIVE · STATS';
}

/* ── Apply tweaks ───────────────────────────────────────────────── */
function applyTweaks(){
  document.getElementById('callouts').style.display = window.__tweaks.showCallouts?'':'none';
  if(window.__drawCables) window.__drawCables();
}
window.__drawCables = drawCables;
applyTweaks();

/* ── SVG download ───────────────────────────────────────────────── */
function downloadSVG(){
  const clone=svg.cloneNode(true);
  clone.setAttribute('xmlns','http://www.w3.org/2000/svg');
  clone.setAttribute('width',820); clone.setAttribute('height',400);
  clone.setAttribute('viewBox','0 0 820 400');
  clone.querySelectorAll('[style]').forEach(n=>{
    const c=(n.getAttribute('style')||'').replace(/animation[^;]*;?/gi,'').trim();
    if(c) n.setAttribute('style',c); else n.removeAttribute('style');
  });
  const d=clone.querySelector('defs');
  d.insertAdjacentHTML('beforeend',`<linearGradient id="bgBase" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#0c0e12"/><stop offset="1" stop-color="#07080a"/></linearGradient>`);
  d.insertAdjacentHTML('afterend',`<rect x="0" y="0" width="820" height="400" fill="url(#bgBase)"/>`);
  clone.insertAdjacentHTML('beforeend',`
    <circle cx="28" cy="28" r="3" fill="#56e0ff"/>
    <text x="40" y="31" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="1.8" fill="#6b7380">HOMELAB</text>
    <text x="800" y="31" text-anchor="end" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="1.8" fill="#6b7380">19" · 16U · ONLINE</text>
    <text x="20" y="385" font-family="JetBrains Mono,monospace" font-size="10" letter-spacing="1.8" fill="#6b7380">PWR · NET · TEMP 22°C</text>
  `);
  const xml=new XMLSerializer().serializeToString(clone);
  const blob=new Blob(['<?xml version="1.0" encoding="UTF-8"?>\n'+xml],{type:'image/svg+xml'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download='homelab-rack.svg';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}
window.__downloadSVG=downloadSVG;

/* ── Tweaks panel ───────────────────────────────────────────────── */
(function tweaksPanel(){
  const panel=document.createElement('div');
  panel.id='tweaks-panel';
  panel.style.cssText=`position:fixed;right:20px;bottom:20px;width:260px;z-index:9999;
    background:#0f1218;border:1px solid #22262e;border-radius:10px;
    padding:14px;font-family:"JetBrains Mono",monospace;font-size:11px;color:#cfd4dc;
    box-shadow:0 12px 40px rgba(0,0,0,.5);display:none;`;
  panel.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;letter-spacing:.15em;color:#8a93a0">
      <span>TWEAKS</span>
      <button id="tw-dl" style="background:#162028;color:#56e0ff;border:1px solid #1d4652;border-radius:4px;padding:3px 8px;font-family:inherit;font-size:10px;cursor:pointer;">↓ SVG</button>
    </div>
    <label style="display:block;margin:8px 0 4px;color:#8a93a0">CABLES</label>
    <select id="tw-cables" style="width:100%;background:#0a0b0d;color:#cfd4dc;border:1px solid #22262e;border-radius:4px;padding:4px;font-family:inherit;font-size:11px">
      <option value="rainbow">Rainbow</option>
      <option value="cool">Cool</option>
      <option value="warm">Warm</option>
      <option value="twotone">Two-tone</option>
      <option value="mono">Mono</option>
    </select>
  `;
  document.body.appendChild(panel);
  const sel=panel.querySelector('#tw-cables');
  sel.value=window.__tweaks.cables;
  sel.addEventListener('change',e=>{
    window.__tweaks.cables=e.target.value; applyTweaks();
    try{ window.parent.postMessage({type:'__edit_mode_set_keys',edits:{cables:e.target.value}},'*'); }catch(_){}
  });
  panel.querySelector('#tw-dl').addEventListener('click',downloadSVG);
  window.addEventListener('message',(ev)=>{
    if(ev.data?.type==='__activate_edit_mode')   panel.style.display='block';
    if(ev.data?.type==='__deactivate_edit_mode') panel.style.display='none';
  });
  window.parent.postMessage({type:'__edit_mode_available'},'*');
})();

/* ── Mobile: set frame height + viewBox via JS (bypasses CSS caching) ── */
// Rack at x=270–550 (center 410), y=40–368.
// Mobile viewBox: 480 wide centered on x=410 → startX=170.
//                 400 tall from y=30 → rack+padding.
// Frame height is set to match viewBox ratio (480:400 = 1.2) so no letterboxing.
(function mobileSetup(){
  const frame = document.getElementById('banner');
  // Rack at x=188–468, center x=328. ViewBox 480 wide centered on 328 → startX=88.
  // y=-20 gives rack top (y=40) at 60/420=14.3% ≈ 49px from frame top → 33px below header ✓
  // Rack bottom (y=324) at 82.6% → ~59px above footer label ✓
  const MOBILE_VB  = '88 -20 480 420';
  const DESKTOP_VB = '0 0 820 400';

  function apply(){
    if(window.innerWidth <= 600){
      // Frame height matches viewBox 480:420 ratio → no letterboxing
      const w = window.innerWidth;
      frame.style.height = Math.round(w * 420/480) + 'px';
      frame.style.aspectRatio = 'unset';
      svg.setAttribute('viewBox', MOBILE_VB);
    } else {
      frame.style.height = '';
      frame.style.aspectRatio = '';
      svg.setAttribute('viewBox', DESKTOP_VB);
    }
  }

  apply();
  window.addEventListener('resize', apply);
})();
</script>
