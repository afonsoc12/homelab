# ==================================================
# Role: maintenance/update
# ==================================================
group_apt_packages:
  # Longhorn needs this package to mount RWX
  - nfs-common
  - open-iscsi
  - lshw
# ==================================================
# Role: k3s_server (k3s-io/k3s-ansible)
# ==================================================
server_group: masters
agent_group: nodes
k3s_version: v1.35.3+k3s1
# K3s server config written to /etc/rancher/k3s/config.yaml on each server node.
# Jinja2 is supported — ansible_tailscale0 is populated after the tailscale role runs.
server_config_yaml: |
  flannel-iface: tailscale0
  node-ip: "{{ ansible_facts['tailscale0']['ipv4']['address'] }}"
  advertise-address: "{{ ansible_facts['tailscale0']['ipv4']['address'] }}"
  node-external-ip: "{{ ansible_facts['tailscale0']['ipv4']['address'] }}"
  disable:
    - traefik
    - servicelb
extra_server_args: ""
extra_agent_args: ""
