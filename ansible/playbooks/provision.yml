---
- name: Update packages
  hosts: all:!unraid
  become: true
  roles:
    - maintenance

- name: Connect to Tailscale
  hosts: all:!unraid
  become: true
  tags: [tailscale]
  roles:
    - role: artis3n.tailscale.machine
      vars:
        tailscale_package: "tailscale={{ tailscale_version }}"
        state: present
