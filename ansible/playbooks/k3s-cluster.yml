---
- name: Update packages
  hosts: k3s_cluster
  become: true
  tags: [update]
  roles:
    - maintenance

- name: Connect to Tailscale
  hosts: k3s_cluster
  become: true
  tags: [tailscale]
  roles:
    - role: artis3n.tailscale.machine
      vars:
        tailscale_package: "tailscale={{ tailscale_version }}"
        state: present

- name: k3s cluster prerequisites
  hosts: k3s_cluster
  become: true
  any_errors_fatal: true
  roles:
    - k3s.orchestration.prereq
    - k3s.orchestration.raspberrypi

- name: Configure multipath for Longhorn
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Ensure multipath.conf contains Longhorn blacklist
      ansible.builtin.blockinfile:
        path: /etc/multipath.conf
        create: true
        mode: "0644"
        block: |
          blacklist {
              devnode "^sd[a-z0-9]+"
          }
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
      notify: Restart multipathd
  handlers:
    - name: Restart multipathd
      ansible.builtin.systemd:
        name: multipathd
        state: restarted

- name: Setup K3s masters
  hosts: masters
  become: true
  gather_facts: false
  any_errors_fatal: true
  roles:
    - k3s.orchestration.k3s_server

- name: Setup K3s nodes
  hosts: nodes
  become: true
  gather_facts: false
  any_errors_fatal: true
  roles:
    - k3s.orchestration.k3s_agent

- name: Bootstrap ArgoCD
  hosts: localhost
  connection: local
  gather_facts: false
  tags: [bootstrap]
  vars:
    gpg_fingerprint: "47E4999BED565F9874AA0E7C05DA03D000FC10D1"
    helmfile_path: "{{ playbook_dir }}/../../kubernetes/bootstrap/helmfile.yaml"
  tasks:
    - name: Export GPG private key
      ansible.builtin.command: gpg --export-secret-keys --armor "{{ gpg_fingerprint }}"
      register: gpg_key
      changed_when: false
      no_log: true

    - name: Run helmfile apply
      ansible.builtin.command: helmfile apply -f "{{ helmfile_path }}" --interactive=false
      environment:
        SOPS_GPG_KEY: "{{ gpg_key.stdout }}"
      register: helmfile_result
      changed_when: "'UPDATED RELEASES' in helmfile_result.stderr"

- name: Reboot k3s masters (rolling)
  hosts: masters
  become: true
  serial: 1
  tags: [never, reboot]
  tasks:
    - name: Reboot
      ansible.builtin.reboot:
        test_command: kubectl get nodes

- name: Upgrade K3s masters (rolling)
  hosts: masters
  become: true
  serial: 1
  tags: [never, upgrade]
  roles:
    - role: k3s.orchestration.k3s_upgrade

- name: Upgrade K3s nodes
  hosts: nodes
  become: true
  tags: [never, upgrade]
  roles:
    - role: k3s.orchestration.k3s_upgrade

- name: Restart k3s service
  hosts: k3s_cluster
  become: true
  serial: 1
  tags: [never, restart]
  tasks:
    - name: Restart k3s
      ansible.builtin.systemd:
        name: "{{ 'k3s' if inventory_hostname in groups['masters'] else 'k3s-agent' }}"
        state: restarted

- name: Reboot k3s nodes
  hosts: nodes
  become: true
  gather_facts: true
  tags: [never, reboot]
  tasks:
    - name: Reboot
      ansible.builtin.reboot:

- name: Prune unused container images
  hosts: k3s_cluster
  become: true
  tags: [never, prune]
  tasks:
    - name: Remove all unused images
      ansible.builtin.command:
        cmd: k3s crictl rmi --prune -all
      register: prune_result
      changed_when: "'Deleted' in prune_result.stdout"

- name: Destroy k3s cluster
  hosts: k3s_cluster
  become: true
  tags: [never, destroy]
  tasks:
    - name: Run k3s uninstall script [master]
      when: "'masters' in group_names"
      ansible.builtin.command:
        cmd: k3s-uninstall.sh
        removes: /var/lib/rancher/k3s/*

    - name: Run k3s uninstall script [node]
      when: "'nodes' in group_names"
      ansible.builtin.command:
        cmd: k3s-agent-uninstall.sh
        removes: /var/lib/rancher/k3s/*

    - name: Remove user kubeconfig
      ansible.builtin.file:
        path: ~{{ ansible_user }}/.kube/config
        state: absent

    - name: Remove k3s install script
      ansible.builtin.file:
        path: /usr/local/bin/k3s-install.sh
        state: absent

    - name: Remove k3s config
      ansible.builtin.file:
        path: /etc/rancher/k3s/config.yaml
        state: absent
