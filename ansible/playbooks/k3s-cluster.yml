---
- name: Update packages
  hosts: k3s_cluster
  become: true
  gather_facts: true
  tags: [update]
  roles:
    - maintenance/update

- name: Connect to Tailscale
  hosts: k3s_cluster
  become: true
  gather_facts: true
  roles:
    - role: artis3n.tailscale.machine
      vars:
        tailscale_package: "tailscale={{ tailscale_version }}"
        state: present

- name: K3s cluster prerequisites
  hosts: k3s_cluster
  gather_facts: true
  become: true
  any_errors_fatal: true
  roles:
    - k3s.orchestration.prereq
    - k3s.orchestration.raspberrypi

- name: Configure multipath for Longhorn
  hosts: k3s_cluster
  become: true
  tasks:
    - name: Ensure multipath.conf contains Longhorn blacklist
      ansible.builtin.blockinfile:
        path: /etc/multipath.conf
        create: true
        mode: "0644"
        block: |
          blacklist {
              devnode "^sd[a-z0-9]+"
          }
        marker: "# {mark} ANSIBLE MANAGED BLOCK"
      notify: Restart multipathd
  handlers:
    - name: Restart multipathd
      ansible.builtin.systemd:
        name: multipathd
        state: restarted

