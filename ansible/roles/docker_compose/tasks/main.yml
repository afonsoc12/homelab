---
- name: Clone compose-files Repository
  ansible.builtin.git:
    repo: https://github.com/afonsoc12/homelab-stackz
    dest: "{{ docker_compose_repo_dest }}"
    version: main
    force: true

- name: Copy .env file to homelab-stackz/compose-files
  ansible.builtin.copy:
    src: "{{ docker_compose_env_file_path }}"
    dest: "{{ docker_compose_repo_dest }}/compose-files"
    mode: "0600"
  when: docker_compose_files or docker_compose_files_containers

- name: Create docker networks
  community.docker.docker_network:
    name: "{{ item.key }}"
    driver: "{{ item.value.driver }}"
    ipam_config: "{{ item.value.ipam_config | default(omit) }}"
    attachable: "{{ item.value.attachable | default(omit) }}"
  with_dict: "{{ docker_compose_networks if docker_compose_networks is iterable else {} }}"

- name: Deploy
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user_id }}/homelab-stackz/compose-files
    env_files: "{{ docker_compose_repo_dest }}/compose-files/{{ docker_compose_env_file_path.split('/')[-1] }}"
    files: "{{ item ~ '.yml' }}"
    project_name: "{{ item }}"
    pull: always
    build: always
    recreate: "{{ docker_compose_recreate_policy }}"
    remove_orphans: true
  loop: "{{ docker_compose_files if docker_compose_files is iterable else [] }}"
  loop_control:
    pause: 10

- name: Deploy (specific containers)
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user_id }}/homelab-stackz/compose-files
    env_files: "{{ docker_compose_repo_dest }}/compose-files/{{ docker_compose_env_file_path.split('/')[-1] }}"
    files: "{{ item.key ~ '.yml' }}"
    project_name: "{{ item.key }}"
    services: "{{ item.value }}"
    pull: always
    build: always
    recreate: "{{ docker_compose_recreate_policy }}"
    remove_orphans: true
  with_dict: "{{ docker_compose_files_containers if docker_compose_files_containers is iterable else {} }}"
  loop_control:
    pause: 10

- name: Tear down
  community.docker.docker_compose_v2:
    project_src: /home/{{ ansible_user_id }}/homelab-stackz/compose-files
    env_files: "{{ docker_compose_repo_dest }}/compose-files/{{ docker_compose_env_file_path.split('/')[-1] }}"
    files: "{{ item ~ '.yml' }}"
    project_name: "{{ item }}"
    state: absent
    remove_images: all
    remove_orphans: true
    remove_volumes: true
  loop: "{{ docker_compose_tear_down_files if docker_compose_tear_down_files is iterable else [] }}"

- name: Prune everything
  community.docker.docker_prune:
    timeout: 180
    containers: true
    images: true
    images_filters:
      dangling: false
    networks: true
    volumes: true
