---
- name: Install Docker
  become: true
  block:
    - name: Ensure group "docker" exists
      ansible.builtin.group:
        name: docker
        state: present

    - name: Put user in "docker" group
      ansible.builtin.user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Remove docker packages
      ansible.builtin.apt:
        force_apt_get: true
        name: ["docker", "docker-engine", "docker.io", "containerd", "runc"]
        state: absent

    - name: Docker dependencies
      ansible.builtin.apt:
        force_apt_get: true
        update_cache: true
        name: ["ca-certificates", "curl", "gnupg", "lsb-release"]
        state: present

    - name: Add Docker GPG apt Key
      ansible.builtin.apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Run lsb_release to detect distro
      ansible.builtin.command: lsb_release -is -cs
      register: docker_provision_lsb_release
      changed_when: false

    - name: Show detected Docker repository
      ansible.builtin.debug:
        msg: "({{ docker_provision_lsb_release.stdout_lines[0] | lower }} {{ docker_provision_lsb_release.stdout_lines[1] }} stable)"
        verbosity: 2

    - name: Add Docker Repository
      ansible.builtin.apt_repository:
        repo: >-
          deb https://download.docker.com/linux/{{ docker_provision_lsb_release.stdout_lines[0] | lower }}
          {{ docker_provision_lsb_release.stdout_lines[1] }} stable
        state: present

    - name: Install docker-ce and docker-compose-plugin
      ansible.builtin.apt:
        force_apt_get: true
        update_cache: true
        name: ["docker-ce", "docker-compose-plugin"]
        state: present

# Without become
- name: Show Docker version
  ansible.builtin.command: docker --version
  register: docker_provision_version
  failed_when: docker_provision_version.stdout.find('Docker version') == -1 or docker_provision_version.stderr
  changed_when: false

- name: Show Docker Compose version
  ansible.builtin.command: docker compose version
  register: docker_provision_compose_version
  failed_when: docker_provision_compose_version.stdout.lower().find('docker compose') == -1 or docker_provision_compose_version.stderr
  changed_when: false

- name: Print Docker version
  ansible.builtin.debug:
    var: docker_provision_version.stdout_lines[0]

- name: Print Docker Compose version
  ansible.builtin.debug:
    var: docker_provision_compose_version.stdout_lines[0]
